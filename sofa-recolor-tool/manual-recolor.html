<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sofa Manual Recolor</title>
  <style>
    :root {
      --bg: #1a1a1e;
      --panel: #25252c;
      --border: #3a3a44;
      --text: #ececf0;
      --muted: #9a9aa8;
      --accent: #6b8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header p { margin: 0; color: var(--muted); font-size: 0.85rem; }
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: calc(100vh - 56px);
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 56px);
    }
    section { margin-bottom: 20px; }
    section h2 {
      margin: 0 0 10px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }
    input[type="file"] { width: 100%; font-size: 0.75rem; color: var(--muted); }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .row span.val { font-size: 0.75rem; color: var(--muted); min-width: 40px; text-align: right; }
    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      margin-bottom: 6px;
    }
    button.secondary { background: #3a3a48; }
    button.danger { background: #8b3a3a; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .workspace {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      overflow: auto;
    }
    .tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .tabs button {
      width: auto;
      flex: 1;
      margin: 0;
      background: #333;
    }
    .tabs button.active { background: var(--accent); }
    .canvas-wrap {
      position: relative;
      border: 1px solid var(--border);
      background: repeating-conic-gradient(#888 0% 25%, #666 0% 50%) 50% / 16px 16px;
      line-height: 0;
    }
    .canvas-wrap canvas { display: block; max-width: min(100%, 900px); height: auto; }
    #maskCanvas {
      position: absolute;
      left: 0;
      top: 0;
      cursor: crosshair;
      opacity: 0.35;
    }
    #maskCanvas.mask-edit {
      opacity: 0.5;
      mix-blend-mode: multiply;
    }
    .hint { font-size: 0.75rem; color: var(--muted); line-height: 1.4; }
    #batchLog {
      font-size: 0.7rem;
      color: var(--muted);
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sofa Manual Recolor</h1>
    <p>HSL adjustment on a hand-painted mask — original shading preserved. No auto matching.</p>
  </header>
  <main>
    <aside>
      <section>
        <h2>Images</h2>
        <label>Base sofa PNG</label>
        <input type="file" id="sofaInput" accept="image/png,image/jpeg,image/webp" />
        <label style="margin-top:10px">Swatch (reference)</label>
        <input type="file" id="swatchInput" accept="image/*" />
        <label style="margin-top:10px">Preset name (for save / batch)</label>
        <input type="text" id="presetName" placeholder="e.g. Bali-Currant" />
      </section>

      <section>
        <h2>Mask</h2>
        <div class="tabs">
          <button type="button" id="tabPaint" class="active">Paint</button>
          <button type="button" id="tabErase">Erase</button>
        </div>
        <div class="row">
          <label>Brush size</label>
          <span class="val" id="brushVal">24</span>
        </div>
        <input type="range" id="brushSize" min="4" max="80" value="24" />
        <button type="button" class="secondary" id="clearMask">Clear mask</button>
        <button type="button" class="secondary" id="saveMask">Download mask PNG</button>
        <label style="margin-top:8px">Load mask PNG</label>
        <input type="file" id="maskInput" accept="image/png" />
        <p class="hint">Paint all leather: cushions, arms, backs, front rail. Skip legs, floor, background.</p>
      </section>

      <section>
        <h2>Adjustments</h2>
        <div class="row"><label>Hue</label><span class="val" id="hueVal">0°</span></div>
        <input type="range" id="hue" min="-180" max="180" value="0" step="1" />
        <div class="row"><label>Saturation</label><span class="val" id="satVal">100%</span></div>
        <input type="range" id="saturation" min="0" max="200" value="100" step="1" />
        <div class="row"><label>Brightness</label><span class="val" id="brightVal">0</span></div>
        <input type="range" id="brightness" min="-60" max="60" value="0" step="1" />
        <div class="row"><label>Contrast</label><span class="val" id="contrastVal">100%</span></div>
        <input type="range" id="contrast" min="50" max="150" value="100" step="1" />
        <div class="row"><label>Shadow lift</label><span class="val" id="shadowVal">0</span></div>
        <input type="range" id="shadowLift" min="0" max="80" value="0" step="1" />
        <div class="row"><label>Highlight strength</label><span class="val" id="highlightVal">0</span></div>
        <input type="range" id="highlightStrength" min="0" max="60" value="0" step="1" />
        <div class="row"><label>Warm / Cool</label><span class="val" id="warmVal">0</span></div>
        <input type="range" id="warmCool" min="-100" max="100" value="0" step="1" />
      </section>

      <section>
        <h2>Presets</h2>
        <button type="button" id="savePreset">Save settings for name</button>
        <button type="button" class="secondary" id="loadPreset">Load settings for name</button>
        <button type="button" class="secondary" id="exportPresets">Export presets JSON</button>
        <label style="margin-top:8px">Import presets JSON</label>
        <input type="file" id="presetsInput" accept="application/json" />
      </section>

      <section>
        <h2>Export</h2>
        <button type="button" id="savePng">Save preview PNG</button>
        <button type="button" class="secondary" id="batchExport">Batch export all presets</button>
        <p id="batchLog"></p>
      </section>
    </aside>

    <div class="workspace">
      <div class="tabs">
        <button type="button" id="viewPreview" class="active">Preview</button>
        <button type="button" id="viewMask">Mask only</button>
      </div>
      <div class="canvas-wrap" id="wrap">
        <canvas id="resultCanvas"></canvas>
        <canvas id="maskCanvas"></canvas>
      </div>
      <p class="hint" id="sizeHint">Load a sofa image to begin.</p>
    </div>
  </main>

  <script>
    const STORAGE_PRESETS = 'sofaManualRecolorPresets';
    const STORAGE_MASK = 'sofaManualRecolorMask';

    let sofaImage = null;
    let sofaData = null;
    let maskData = null;
    let width = 0;
    let height = 0;
    let paintMode = 'paint';
    let isDrawing = false;
    let viewMode = 'preview';

    const resultCanvas = document.getElementById('resultCanvas');
    const maskCanvas = document.getElementById('maskCanvas');
    const resultCtx = resultCanvas.getContext('2d', { willReadFrequently: true });
    const maskCtx = maskCanvas.getContext('2d');

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function rgbToHsl(r, g, b) {
      const rn = r / 255;
      const gn = g / 255;
      const bn = b / 255;
      const max = Math.max(rn, gn, bn);
      const min = Math.min(rn, gn, bn);
      const l = (max + min) / 2;
      if (max === min) return { h: 0, s: 0, l };
      const d = max - min;
      const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      let h = 0;
      if (max === rn) h = ((gn - bn) / d + (gn < bn ? 6 : 0)) / 6;
      else if (max === gn) h = ((bn - rn) / d + 2) / 6;
      else h = ((rn - gn) / d + 4) / 6;
      return { h, s, l };
    }

    function hslToRgb(h, s, l) {
      if (s === 0) {
        const v = Math.round(l * 255);
        return [v, v, v];
      }
      const hue2rgb = (p, q, t) => {
        let tt = t;
        if (tt < 0) tt += 1;
        if (tt > 1) tt -= 1;
        if (tt < 1 / 6) return p + (q - p) * 6 * tt;
        if (tt < 1 / 2) return q;
        if (tt < 2 / 3) return p + (q - p) * (2 / 3 - tt) * 6;
        return p;
      };
      const q = l < 0.5 ? l * (1 + s) : l + s - l * s;
      const p = 2 * l - q;
      return [
        Math.round(clamp(hue2rgb(p, q, h + 1 / 3) * 255, 0, 255)),
        Math.round(clamp(hue2rgb(p, q, h) * 255, 0, 255)),
        Math.round(clamp(hue2rgb(p, q, h - 1 / 3) * 255, 0, 255)),
      ];
    }

    function getParams() {
      return {
        hue: Number(document.getElementById('hue').value),
        saturation: Number(document.getElementById('saturation').value) / 100,
        brightness: Number(document.getElementById('brightness').value) / 255,
        contrast: Number(document.getElementById('contrast').value) / 100,
        shadowLift: Number(document.getElementById('shadowLift').value) / 255,
        highlightStrength: Number(document.getElementById('highlightStrength').value) / 255,
        warmCool: Number(document.getElementById('warmCool').value) / 100,
      };
    }

    function setParams(p) {
      document.getElementById('hue').value = p.hue ?? 0;
      document.getElementById('saturation').value = Math.round((p.saturation ?? 1) * 100);
      document.getElementById('brightness').value = Math.round((p.brightness ?? 0) * 255);
      document.getElementById('contrast').value = Math.round((p.contrast ?? 1) * 100);
      document.getElementById('shadowLift').value = Math.round((p.shadowLift ?? 0) * 255);
      document.getElementById('highlightStrength').value = Math.round((p.highlightStrength ?? 0) * 255);
      document.getElementById('warmCool').value = Math.round((p.warmCool ?? 0) * 100);
      updateSliderLabels();
    }

    function adjustHsl(r, g, b, p) {
      let { h, s, l } = rgbToHsl(r, g, b);
      h = (h + p.hue / 360 + p.warmCool * 0.04) % 1;
      if (h < 0) h += 1;
      s = clamp(s * p.saturation, 0, 1);
      l = clamp(l + p.brightness, 0, 1);
      l = clamp((l - 0.5) * p.contrast + 0.5, 0, 1);
      if (l < 0.42) l += p.shadowLift * (1 - l / 0.42) * 0.55;
      if (l > 0.72) l = clamp(l + p.highlightStrength * (l - 0.72) * 1.8, 0, 1);
      return hslToRgb(h, s, l);
    }

    function render() {
      if (!sofaData || !maskData) return;
      const p = getParams();
      const out = resultCtx.createImageData(width, height);
      const src = sofaData.data;
      const mask = maskData.data;

      for (let j = 0, i = 0; j < width * height; j++, i += 4) {
        const mw = mask[i] / 255;
        const oR = src[i];
        const oG = src[i + 1];
        const oB = src[i + 2];

        if (mw < 0.02) {
          out.data[i] = oR;
          out.data[i + 1] = oG;
          out.data[i + 2] = oB;
          out.data[i + 3] = 255;
          continue;
        }

        const [nR, nG, nB] = adjustHsl(oR, oG, oB, p);
        const t = mw < 1 ? mw * mw * (3 - 2 * mw) : 1;
        out.data[i] = Math.round(oR + (nR - oR) * t);
        out.data[i + 1] = Math.round(oG + (nG - oG) * t);
        out.data[i + 2] = Math.round(oB + (nB - oB) * t);
        out.data[i + 3] = 255;
      }

      resultCtx.putImageData(out, 0, 0);
      maskCtx.putImageData(maskData, 0, 0);

      if (viewMode === 'mask') {
        const m = maskCtx.getImageData(0, 0, width, height);
        const vis = resultCtx.createImageData(width, height);
        for (let k = 0; k < m.data.length; k += 4) {
          const v = m.data[k];
          vis.data[k] = v;
          vis.data[k + 1] = v;
          vis.data[k + 2] = v;
          vis.data[k + 3] = 255;
        }
        resultCtx.putImageData(vis, 0, 0);
      }
    }

    function resizeCanvases(w, h) {
      width = w;
      height = h;
      for (const c of [resultCanvas, maskCanvas]) {
        c.width = w;
        c.height = h;
      }
      maskCanvas.classList.add('mask-edit');
      document.getElementById('sizeHint').textContent = `${w} × ${h}px`;
    }

    function initMask(fill = 0) {
      maskData = maskCtx.createImageData(width, height);
      for (let i = 0; i < maskData.data.length; i += 4) {
        maskData.data[i] = fill;
        maskData.data[i + 1] = fill;
        maskData.data[i + 2] = fill;
        maskData.data[i + 3] = 255;
      }
      render();
    }

    function loadSofaFromImage(img) {
      sofaImage = img;
      resizeCanvases(img.naturalWidth, img.naturalHeight);
      resultCtx.drawImage(img, 0, 0);
      sofaData = resultCtx.getImageData(0, 0, width, height);
      const saved = localStorage.getItem(STORAGE_MASK);
      if (saved) {
        const m = new Image();
        m.onload = () => {
          maskCtx.drawImage(m, 0, 0, width, height);
          maskData = maskCtx.getImageData(0, 0, width, height);
          render();
        };
        m.src = saved;
      } else {
        initMask(0);
      }
    }

    document.getElementById('sofaInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const img = new Image();
      img.onload = () => loadSofaFromImage(img);
      img.src = URL.createObjectURL(file);
    });

    document.getElementById('swatchInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const name = file.name.replace(/\.[^.]+$/, '');
      document.getElementById('presetName').value = name;
    });

    document.getElementById('maskInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file || !width) return;
      const img = new Image();
      img.onload = () => {
        maskCtx.drawImage(img, 0, 0, width, height);
        maskData = maskCtx.getImageData(0, 0, width, height);
        for (let i = 0; i < maskData.data.length; i += 4) {
          const v = maskData.data[i] > 127 ? 255 : 0;
          maskData.data[i] = v;
          maskData.data[i + 1] = v;
          maskData.data[i + 2] = v;
        }
        render();
      };
      img.src = URL.createObjectURL(file);
    });

    function paintAt(clientX, clientY) {
      const rect = maskCanvas.getBoundingClientRect();
      const scaleX = width / rect.width;
      const scaleY = height / rect.height;
      const x = (clientX - rect.left) * scaleX;
      const y = (clientY - rect.top) * scaleY;
      const r = Number(document.getElementById('brushSize').value);
      const val = paintMode === 'paint' ? 255 : 0;

      maskCtx.fillStyle = `rgb(${val},${val},${val})`;
      maskCtx.beginPath();
      maskCtx.arc(x, y, r, 0, Math.PI * 2);
      maskCtx.fill();

      maskData = maskCtx.getImageData(0, 0, width, height);
      render();
    }

    maskCanvas.addEventListener('pointerdown', (e) => {
      isDrawing = true;
      maskCanvas.setPointerCapture(e.pointerId);
      paintAt(e.clientX, e.clientY);
    });
    maskCanvas.addEventListener('pointermove', (e) => {
      if (!isDrawing) return;
      paintAt(e.clientX, e.clientY);
    });
    maskCanvas.addEventListener('pointerup', () => {
      isDrawing = false;
      try {
        localStorage.setItem(STORAGE_MASK, maskCanvas.toDataURL('image/png'));
      } catch {
        /* quota */
      }
    });

    document.getElementById('tabPaint').onclick = () => {
      paintMode = 'paint';
      document.getElementById('tabPaint').classList.add('active');
      document.getElementById('tabErase').classList.remove('active');
    };
    document.getElementById('tabErase').onclick = () => {
      paintMode = 'erase';
      document.getElementById('tabErase').classList.add('active');
      document.getElementById('tabPaint').classList.remove('active');
    };

    document.getElementById('clearMask').onclick = () => {
      if (!width) return;
      initMask(0);
    };

    document.getElementById('saveMask').onclick = () => {
      if (!maskData) return;
      maskCanvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'upholstery-mask.png';
        a.click();
      });
    };

    document.getElementById('viewPreview').onclick = () => {
      viewMode = 'preview';
      document.getElementById('viewPreview').classList.add('active');
      document.getElementById('viewMask').classList.remove('active');
      maskCanvas.style.pointerEvents = 'auto';
      render();
    };
    document.getElementById('viewMask').onclick = () => {
      viewMode = 'mask';
      document.getElementById('viewMask').classList.add('active');
      document.getElementById('viewPreview').classList.remove('active');
      maskCanvas.style.opacity = '1';
      maskCanvas.style.pointerEvents = 'auto';
      render();
    };

    function updateSliderLabels() {
      document.getElementById('hueVal').textContent = `${document.getElementById('hue').value}°`;
      document.getElementById('satVal').textContent = `${document.getElementById('saturation').value}%`;
      document.getElementById('brightVal').textContent = document.getElementById('brightness').value;
      document.getElementById('contrastVal').textContent = `${document.getElementById('contrast').value}%`;
      document.getElementById('shadowVal').textContent = document.getElementById('shadowLift').value;
      document.getElementById('highlightVal').textContent = document.getElementById('highlightStrength').value;
      document.getElementById('warmVal').textContent = document.getElementById('warmCool').value;
      document.getElementById('brushVal').textContent = document.getElementById('brushSize').value;
    }

    for (const id of [
      'hue', 'saturation', 'brightness', 'contrast',
      'shadowLift', 'highlightStrength', 'warmCool', 'brushSize',
    ]) {
      document.getElementById(id).addEventListener('input', () => {
        updateSliderLabels();
        render();
      });
    }

    function getPresets() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_PRESETS) || '{}');
      } catch {
        return {};
      }
    }

    function setPresets(obj) {
      localStorage.setItem(STORAGE_PRESETS, JSON.stringify(obj));
    }

    document.getElementById('savePreset').onclick = () => {
      const name = document.getElementById('presetName').value.trim();
      if (!name) return alert('Enter a preset name (e.g. Bali-Currant)');
      const presets = getPresets();
      presets[name] = getParams();
      setPresets(presets);
      alert(`Saved settings for "${name}"`);
    };

    document.getElementById('loadPreset').onclick = () => {
      const name = document.getElementById('presetName').value.trim();
      const presets = getPresets();
      if (!presets[name]) return alert(`No saved settings for "${name}"`);
      setParams(presets[name]);
      render();
    };

    document.getElementById('exportPresets').onclick = () => {
      const blob = new Blob([JSON.stringify(getPresets(), null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'sofa-recolor-presets.json';
      a.click();
    };

    document.getElementById('presetsInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          setPresets(JSON.parse(reader.result));
          alert('Presets imported.');
        } catch {
          alert('Invalid JSON');
        }
      };
      reader.readAsText(file);
    });

    document.getElementById('savePng').onclick = () => {
      if (!sofaData) return alert('Load a sofa first');
      const name = document.getElementById('presetName').value.trim() || 'sofa';
      resultCanvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${name}.png`;
        a.click();
      });
    });

    document.getElementById('batchExport').onclick = async () => {
      if (!sofaData || !maskData) return alert('Load sofa and paint mask first');
      const presets = getPresets();
      const names = Object.keys(presets);
      if (!names.length) return alert('Save at least one preset first');
      const log = document.getElementById('batchLog');
      log.textContent = '';
      for (const name of names) {
        setParams(presets[name]);
        render();
        await new Promise((resolve) => {
          resultCanvas.toBlob((blob) => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${name}.png`;
            a.click();
            log.textContent += `Exported ${name}.png\n`;
            setTimeout(resolve, 400);
          });
        });
      }
    };

    updateSliderLabels();

    // Auto-load default sofa from input/ when served locally
    fetch('input/sofa.png')
      .then((r) => (r.ok ? r.blob() : null))
      .then((blob) => {
        if (!blob) return;
        const img = new Image();
        img.onload = () => loadSofaFromImage(img);
        img.src = URL.createObjectURL(blob);
      })
      .catch(() => {});
  </script>
</body>
</html>
