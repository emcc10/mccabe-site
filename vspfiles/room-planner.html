<div id="roomPlannerApp">

<meta charset="utf-8">
<title>Media Room Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body{
    margin:0;
    font-family: Helvetica, Arial, sans-serif;
    background:#fff;
  }

  #page{
    min-height:100vh;
    display:flex;
    justify-content:center;
  }

  #shell{
    width:1200px;
    padding-bottom:40px;
  }

  #room-inputs{
    display:flex;
    gap:12px;
    margin:40px 0 16px 45px;
    align-items:center;
  }
  #room-inputs input{ width:60px; }

#tray{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
  position:relative;
}

.tray-nav{
  width:36px;
  height:36px;
  border:1px solid #ddd;
  border-radius:18px;
  background:#f6f6f6;
  cursor:pointer;
  z-index:2;
  flex:0 0 auto;
}

#tray-items{
  display:flex;
  gap:8px;
  width:900px;
  overflow-x:auto;
  scroll-behavior:smooth;
  flex:0 0 auto;
}




  .tray-item{
    width:150px;
    flex:0 0 150px;
    text-align:center;
    font-size:11px;
    cursor:pointer;
  }

  .tray-item img{
    width:130px;
    max-height:80px;
    object-fit:contain;
    display:block;
    margin:0 auto;
    pointer-events:none;
  }

  #room-wrapper{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
  }

  #room{
    position:relative;
    border:3px solid #ccc;
    background:#fff;
min-width: 300px;
  min-height: 200px;
  }

  #room::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(to right, rgba(0,0,0,.15) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0,0,0,.15) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    pointer-events:none;
  }

  .room-dim{
    position:absolute;
    font-size:16px;
    background:#fff;
    padding:2px 4px;
    color:#555;
    z-index:5;
  }
  #dim-top{ top:4px; left:50%; transform:translateX(-50%); }
  #dim-left{ left:4px; top:50%; transform:translateY(-50%) rotate(-90deg); }

  .seat{
    position:absolute;
    cursor:grab;
    overflow:hidden;
  }
  .seat:active{ cursor:grabbing; }
  .seat.active{ outline:2px dashed #3b82f6; }

  #room .seat img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:fill;
    display:block;
  }

  #toolbar{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-top:14px;
  }
  button{
    padding:8px 16px;
    border:1px solid #ccc;
    background:#f7f7f7;
    cursor:pointer;
  }
</style>
</head>

<body>
<div id="page">
  <div id="shell">

    <div id="room-inputs">
      Width (ft): <input id="roomW" value="16">
      Depth (ft): <input id="roomD" value="12">
      <button id="applyRoom">Apply</button>
    </div>

    <div id="tray">
      <button class="tray-nav" id="navL">&lt;</button>
      <div id="tray-items"></div>
      <button class="tray-nav" id="navR">&gt;</button>
    </div>

    <div id="room-wrapper">
      <div id="room">
        <div id="dim-top" class="room-dim"></div>
        <div id="dim-left" class="room-dim"></div>
      </div>
    </div>

    <div id="toolbar">
      <button id="rotateL">Rotate ⟲</button>
      <button id="rotateR">Rotate ⟳</button>
      <button id="deleteBtn">Delete</button>
<button id="saveLayout">Save Layout</button>


    </div>

  </div>
</div>

<script>
const PX_PER_INCH = 4;
const SEAT_DEPTH_IN = 39;
const BASE_SEAT_PRICE = 0;       // <-- set this to your base per-seat price
const PRICE_4L = 0;              // <-- set this to your 4L armless loveseat price (less than 2 seats)

function calculatePlannerPrice(counts){
  let total = 0;

  // everything is 1 seat at base price EXCEPT 4L
  Object.keys(counts).forEach(id => {
    const qty = counts[id] || 0;
    if (!qty) return;

    if (id === "4L") total += qty * PRICE_4L;
    else total += qty * BASE_SEAT_PRICE;
  });

  return total;
}

const room = document.getElementById("room");
const roomW = document.getElementById("roomW");
const roomD = document.getElementById("roomD");
const dimTop = document.getElementById("dim-top");
const dimLeft = document.getElementById("dim-left");
const trayItemsel= document.getElementById("tray-items");
const trayNavBtns = document.querySelectorAll(".tray-nav");

function getCounts(){
  const counts = {};
  document.querySelectorAll(".seat").forEach(seat => {
    const id = seat.dataset.pieceId || "UNKNOWN";
    counts[id] = (counts[id] || 0) + 1;
  });
  return counts;
}


let activeSeat = null;

const PIECES = [
  { id:"1L", name:"1L Recliner", widthIn:38, img:"/v/vspfiles/MRP/1L.png", norm:{ scale:1, x:0, y:0 }},
  { id:"2L", name:"2L LHF Recliner", widthIn:30, img:"/v/vspfiles/MRP/2L.png", norm:{ scale:1, x:0, y:0 }},
  { id:"3L", name:"3L RHF Recliner",  widthIn:30, img:"/v/vspfiles/MRP/3L.png", norm:{ scale:1.12, x:0, y:0 }},
  { id:"4L", name:"4L Armless Loveseat", widthIn:46, img:"/v/vspfiles/MRP/4L.png", norm:{ scale:1.03, x:0, y:0 }},
 { id:"5L", name:"5L RHF Wedge, LHF Straight", widthIn:46, img:"/v/vspfiles/MRP/5L.png"},
  { id:"6L", name:"6L LHF Wedge, RHF Straight", widthIn:46, img:"/v/vspfiles/MRP/6L.png"},
  { id:"7L", name:"7L RHF Wedge", widthIn:38, img:"/v/vspfiles/MRP/7L.png"},
  { id:"8L", name:"8L Armless Recliner", widthIn:23, img:"/v/vspfiles/MRP/8L.png", norm:{ scale:1.03, x:0, y:0 }},
{ id:"9L", name:"9L LHF Wedge", widthIn:38, img:"/v/vspfiles/MRP/9L.png"},
];

function applyRoom(){
  const w = roomW.value * 12 * PX_PER_INCH;
  const h = roomD.value * 12 * PX_PER_INCH;
  room.style.width = w+"px";
  room.style.height = h+"px";
  room.style.setProperty("--grid-size",(12*PX_PER_INCH)+"px");
  dimTop.textContent = roomW.value+" ft";
  dimLeft.textContent = roomD.value+" ft";
}
applyRoom();
document.getElementById("applyRoom").onclick = applyRoom;


function setActive(seat){
  document.querySelectorAll(".seat").forEach(s=>s.classList.remove("active"));
  activeSeat = seat;
  seat.classList.add("active");
}
function calculateSeatCount(){
  let seats = 0;

  document.querySelectorAll(".seat").forEach(seat => {
    const id = seat.dataset.pieceId;
    if (id === "4L") seats += 2;       // armless loveseat = 2 seats
    else seats += 1;
  });

  return seats;
}

function getNon4LCount(){
  let n = 0;
  document.querySelectorAll(".seat").forEach(seat => {
    if (seat.dataset.pieceId !== "4L") n++;
  });
  return n;
}

function makeDraggable(el){
  el.addEventListener("mousedown", e=>{
    setActive(el);
    const sx=e.clientX, sy=e.clientY;
    const ox=el.offsetLeft, oy=el.offsetTop;
    function move(ev){
      el.style.left = ox + ev.clientX - sx + "px";
      el.style.top  = oy + ev.clientY - sy + "px";
    }
    function up(){
      document.removeEventListener("mousemove",move);
      document.removeEventListener("mouseup",up);
    }
    document.addEventListener("mousemove",move);
    document.addEventListener("mouseup",up);
  });
}

function addSeat(piece){
  if (piece.id === "4L") {
    var non4L = getNon4LCount();
    if (non4L < 2) {
      alert("A 4L Armless Loveseat can only be added when at least two other pieces (e.g. 1L, 2L, 3L) are already in the room.");
      return;
    }
  }
  const seat = document.createElement("div");
  seat.className = "seat";
seat.dataset.rot = "0";
  seat.style.left = "40px";
  seat.style.top  = "40px";
seat.dataset.pieceId = piece.id;

  const seatW = piece.widthIn * PX_PER_INCH;
  const seatH = SEAT_DEPTH_IN * PX_PER_INCH;
  seat.style.width  = seatW + "px";
  seat.style.height = seatH + "px";

  const img = document.createElement("img");
  img.src = piece.img;
  img.draggable = false;

 img.onload = () => {
  seat._norm = piece.norm || { scale:1, x:0, y:0 };
  applySeatTransform(seat);
};



  seat.appendChild(img);
  room.appendChild(seat);
  makeDraggable(seat);
  setActive(seat);
}


// BUILD TRAY
PIECES.forEach(p=>{
  const item = document.createElement("div");
  item.className = "tray-item";
  item.innerHTML = `<img src="${p.img}"><div>${p.name}</div>`;
  item.onclick = () => addSeat(p);
  trayItemsel.appendChild(item);
});
// TRAY SCROLL CONTROLS (must come AFTER tray items exist)
const tray = document.getElementById("tray-items");

document.getElementById("navL").onclick = () => {
  tray.scrollBy({ left: -300, behavior: "smooth" });
};

document.getElementById("navR").onclick = () => {
  tray.scrollBy({ left: 300, behavior: "smooth" });
};




function applySeatTransform(seat){
  const img = seat.querySelector("img");
  const n = seat._norm || { scale:1, x:0, y:0 };

  // image normalization only
  img.style.transform =
    `translate(${n.x}px, ${n.y}px)
     scale(${n.scale})`;
}


function rotateSeat(delta){
  if(!activeSeat) return;
  let rot = parseFloat(activeSeat.dataset.rot || "0");
  rot = (rot + delta) % 360;
  activeSeat.dataset.rot = rot;
  activeSeat.style.transform = `rotate(${rot}deg)`;
}

document.getElementById("rotateL").onclick = () => rotateSeat(-5);
document.getElementById("rotateR").onclick = () => rotateSeat(5);


document.getElementById("deleteBtn").onclick=()=>{
  if(activeSeat){ activeSeat.remove(); activeSeat=null; }
};
function serializeLayout(){
  return Array.from(document.querySelectorAll(".seat")).map(seat => ({
    id: seat.dataset.pieceId,
    x: seat.offsetLeft,
    y: seat.offsetTop,
    rot: parseFloat(seat.dataset.rot || "0"),
    w: seat.offsetWidth
  }));
}

document.getElementById("saveLayout").onclick = () => {
  const counts = getCounts();
  const layout = serializeLayout();
  const seatCount = calculateSeatCount();
  const payload = {
    options: counts,
    counts: counts,
    room: { width: roomW.value, depth: roomD.value },
    layout: layout,
    seatCount: seatCount,
    ts: Date.now()
  };

  localStorage.setItem("roomPlannerData", JSON.stringify(payload));

  if (window.opener && window.opener.postMessage) {
    window.opener.postMessage(
      { type:"ROOM_PLANNER_APPLY", payload },
      location.origin
    );
  }

  var blob = new Blob([JSON.stringify({
    room: payload.room,
    layout: layout,
    pieces: counts,
    seatCount: seatCount,
    savedAt: new Date().toISOString()
  }, null, 2)], { type: "application/json" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "room-layout-" + new Date().toISOString().slice(0,19).replace(/[-:]/g,"").replace("T","-") + ".json";
  a.click();
  URL.revokeObjectURL(a.href);

  alert("Layout saved and file downloaded.");
};

function buildPlannerOptions(){
  const counts = {};
  room.querySelectorAll(".seat").forEach(seat => {
    const id = seat.dataset.pieceId || "UNKNOWN";
    counts[id] = (counts[id] || 0) + 1;
  });

  return counts;
}



</script>
</div>
