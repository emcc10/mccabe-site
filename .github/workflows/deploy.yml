name: Find Real Volusion Template Path

on:
  workflow_dispatch:

jobs:
  find-template-path:
    runs-on: ubuntu-latest

    steps:
      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          nc -vz -w 20 "$FTP_SERVER" 2222

      - name: Download likely template files from Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 120
          set net:max-retries 2
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit no

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Trying /v/template_266.html"
          get /v/template_266.html -o downloaded-v-template_266.html

          echo "Trying /template_266.html"
          get /template_266.html -o downloaded-root-template_266.html

          echo "Trying /vspfiles/templates/266/template_266.html"
          get /vspfiles/templates/266/template_266.html -o downloaded-vspfiles-template_266.html

          echo "Trying /v/vspfiles/templates/266/template_266.html"
          get /v/vspfiles/templates/266/template_266.html -o downloaded-v-vspfiles-template_266.html

          echo "Trying /vspfiles/templates/266/template.html"
          get /vspfiles/templates/266/template.html -o downloaded-vspfiles-template.html

          echo "Trying /v/vspfiles/templates/266/template.html"
          get /v/vspfiles/templates/266/template.html -o downloaded-v-vspfiles-template.html

          bye
          EOF

          echo "Downloaded files:"
          ls -la downloaded-* || true

          echo "Searching for manual Volusion editor marker..."
          grep -Rni "VOLUSION_EDITOR_MANUAL_MARKER_20260429" downloaded-* || true

          echo "Searching for template names/markers..."
          grep -Rni "template_266\|MC_DEPLOY_VERIFY\|GITHUB TEMPLATE\|0428\|MCCABE" downloaded-* | head -80 || true
