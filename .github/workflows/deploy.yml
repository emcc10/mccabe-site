name: Deploy to Volusion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install tools
        run: |
          sudo apt-get install -y lftp netcat-openbsd

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Deploy files to Volusion
        run: |
          echo "deployed=$(date -u '+%Y-%m-%dT%H:%M:%SZ') commit=$GITHUB_SHA" > deploy-marker.txt
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222 <<'EOF' || true
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          set cmd:fail-exit no

          echo "Uploading deploy marker"
          put deploy-marker.txt -o /vspfiles/js/deploy-marker.txt

          echo "Uploading template to /template_266.html"
          put template_266.html -o /template_266.html

          echo "Uploading template to /v/template_266.html"
          put template_266.html -o /v/template_266.html

          echo "Uploading custom-safe.css"
          put vspfiles/css/custom-safe.css -o /vspfiles/css/custom-safe.css

          echo "Uploading sectional-configs.js"
          put vspfiles/js/sectional-configs.js -o /vspfiles/js/sectional-configs.js

          echo "Uploading mtl-sectional-renderer.js"
          put vspfiles/js/mtl-sectional-renderer.js -o /vspfiles/js/mtl-sectional-renderer.js

          bye
          EOF
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Retry mtl-sectional-renderer.js if locked
        run: |
          # mtl-sectional-renderer.js is frequently locked by Volusion's runtime when first attempted.
          # Retry up to 6 times with increasing sleeps. Each attempt is its own lftp session so the
          # server has time to release the file handle between tries.
          for attempt in 1 2 3 4 5 6; do
            echo "=== Retry attempt $attempt for mtl-sectional-renderer.js ==="
            sleep $((attempt * 5))
            OUT=$(lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222 -e "set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 30; put vspfiles/js/mtl-sectional-renderer.js -o /vspfiles/js/mtl-sectional-renderer.js; bye" 2>&1)
            echo "$OUT"
            if ! echo "$OUT" | grep -q "Access failed"; then
              echo "=== mtl-sectional-renderer.js uploaded successfully on attempt $attempt ==="
              break
            fi
            if [ "$attempt" = "6" ]; then
              echo "=== WARNING: mtl-sectional-renderer.js still locked after 6 attempts. Continuing. ==="
            fi
          done
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Deploy summary
        run: |
          echo "Volusion deploy complete."
          echo "Uploaded:"
          echo "- /template_266.html"
          echo "- /v/template_266.html"
          echo "- /vspfiles/css/custom-safe.css"
          echo "- /vspfiles/js/sectional-configs.js"
          echo "- /vspfiles/js/mtl-sectional-renderer.js"
          echo "- /vspfiles/js/deploy-marker.txt  <- verify at https://www.mccabestheaterandliving.com/v/vspfiles/js/deploy-marker.txt"
