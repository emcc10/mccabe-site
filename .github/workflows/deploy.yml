name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      remote_path:
        description: "Remote path for vspfiles (e.g. /vspfiles/)"
        required: false
        default: "/vspfiles/"
      template_remote_path:
        description: "Remote path for template_266.html (e.g. /vspfiles/templates/266/)"
        required: false
        default: "/vspfiles/templates/266/"
