name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Verify local files exist
        run: |
          echo "Repo root:"
          pwd

          echo "Repo files:"
          find . -maxdepth 4 -type f | sort

          echo "Checking required files..."

          if [ ! -f "template_266.html" ]; then
            echo "ERROR: template_266.html is missing from repo root"
            exit 1
          fi

          if [ ! -f "vspfiles/css/custom-safe.css" ]; then
            echo "ERROR: vspfiles/css/custom-safe.css is missing"
            exit 1
          fi

          echo "Required files found."

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER length: ${#FTP_SERVER}"
          echo "FTP_USERNAME length: ${#FTP_USERNAME}"
          echo "FTP_PASSWORD length: ${#FTP_PASSWORD}"

      - name: Deploy files to Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 45
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set xfer:clobber yes
          set cmd:fail-exit yes

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Connected to Volusion"
          pwd
          ls

          echo "Deploying template..."
          put template_266.html -o /v/template_266.html

          echo "Deploying custom CSS..."
          mkdir -p /v/vspfiles/css
          put vspfiles/css/custom-safe.css -o /v/vspfiles/css/custom-safe.css

          echo "Verifying remote files..."
          cls -l /v/template_266.html
          cls -l /v/vspfiles/css/custom-safe.css

          bye
          EOF
