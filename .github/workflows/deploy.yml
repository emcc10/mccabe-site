name: Deploy Volusion Template

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      SFTP_PORT: ${{ secrets.SFTP_PORT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          [ -n "$FTP_SERVER" ] || (echo "::error::FTP_SERVER missing" && exit 1)
          [ -n "$FTP_USERNAME" ] || (echo "::error::FTP_USERNAME missing" && exit 1)
          [ -n "$FTP_PASSWORD" ] || (echo "::error::FTP_PASSWORD missing" && exit 1)
          [ -n "$SFTP_PORT" ] || (echo "::error::SFTP_PORT missing" && exit 1)

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Show local file
        run: |
          ls -la deploy-template
          ls -la deploy-template/template_266.html

      - name: Create SFTP batch file
        run: |
          cat > sftp-batch.txt <<'EOF'
          put deploy-template/template_266.html /v/template_266.html
          ls -l /v/template_266.html
          bye
          EOF
          cat sftp-batch.txt

      - name: Upload template via SFTP batch mode
        run: |
          sshpass -p "$FTP_PASSWORD" sftp \
            -vvv \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -P "$SFTP_PORT" \
            -b sftp-batch.txt \
            "$FTP_USERNAME@$FTP_SERVER"
