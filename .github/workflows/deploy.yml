name: Deploy to Volusion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove problematic Microsoft/Azure apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install lftp and netcat
        run: |
          sudo apt-get install -y lftp netcat-openbsd openssh-client

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Seed SSH known_hosts (non-interactive SFTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if ssh-keyscan -T -t rsa,ecdsa,ed25519 -p 2222 "$FTP_SERVER" >> ~/.ssh/known_hosts 2>/dev/null; then
            chmod 600 ~/.ssh/known_hosts
          else
            echo "::warning::ssh-keyscan failed; deploy may fail on host-key verification depending on SSH/lftp defaults."
          fi

      - name: Deploy template and JS to Volusion
        run: |
          set -euo pipefail
          echo "Uploading template to /template_266.html..."
          echo "Uploading template to /v/template_266.html..."
          echo "Uploading sectional-configs.js..."
          echo "Uploading mtl-sectional-renderer.js..."

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222 <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          set xfer:clobber yes

          put template_266.html -o /template_266.html
          put template_266.html -o /v/template_266.html
          put vspfiles/js/sectional-configs.js -o /vspfiles/js/sectional-configs.js
          put vspfiles/js/mtl-sectional-renderer.js -o /vspfiles/js/mtl-sectional-renderer.js
          bye
          EOF
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Deploy custom-safe.css (best effort)
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Uploading custom-safe.css..."

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222 <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          set xfer:clobber yes

          put vspfiles/css/custom-safe.css -o /vspfiles/css/custom-safe.css
          bye
          EOF
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Print deploy marker
        run: |
          STAMP="$(date -u '+%Y%m%d%H%M')"
          echo "Deploy completed at $(date -u)"
          echo "Uploaded template (both roots), sectional-configs.js, mtl-sectional-renderer.js, and attempted custom-safe.css"
          echo "Verify renderer (CDN path; SFTP uploads to /vspfiles/js/..., not /v/vspfiles/js):"
          echo "https://www.mccabestheaterandliving.com/v/vspfiles/js/mtl-sectional-renderer.js?v=deploy-test-${STAMP}"
