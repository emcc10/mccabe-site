name: Deploy Volusion Theme (SFTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy HTML templates
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "templates/266/*"
          target: "/vspfiles/templates/266/"

      - name: Deploy CSS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "css/*"
          target: "/vspfiles/css/"

      - name: Deploy JS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "js/*"
          target: "/vspfiles/js/"
