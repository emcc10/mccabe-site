name: Deploy Volusion Template - Hard Verify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show GitHub file being deployed
        run: |
          echo "Current branch/ref:"
          echo "$GITHUB_REF"

          echo "Current commit:"
          git log -1 --oneline

          echo "Repo root:"
          pwd

          echo "Confirm template file exists:"
          ls -la template_266.html

          echo "Confirm CSS / overrides exist:"
          ls -la vspfiles/css/custom-safe.css vspfiles/templates/266/css/mccabe-overrides.css

          echo "Local template marker search:"
          grep -n "MC_DEPLOY_VERIFY\|mc-deploy-verify" template_266.html || true

          echo "First 20 lines of local template:"
          head -20 template_266.html

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Paramiko
        run: pip install --disable-pip-version-check "paramiko>=3.4,<4"

      - name: Check deploy secrets
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$SFTP_HOST" || (echo "ERROR: GitHub secret FTP_SERVER is blank" && exit 1)
          test -n "$SFTP_USER" || (echo "ERROR: GitHub secret FTP_USERNAME is blank" && exit 1)
          test -n "$SFTP_PASS" || (echo "ERROR: GitHub secret FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER / FTP_USERNAME / FTP_PASSWORD are set (mapped to SFTP_* for scripts)."

      - name: Test Volusion SFTP port
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          python3 <<'PY'
          import os
          import socket

          host = os.environ["SFTP_HOST"]
          port = int((os.environ.get("SFTP_PORT") or "").strip() or "2222")
          s = socket.socket()
          s.settimeout(25)
          try:
              s.connect((host, port))
          finally:
              s.close()
          print(f"OK: TCP connect to {host}:{port}")
          PY

      - name: Upload template + CSS + theme overrides (Paramiko)
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_TEMPLATE_REMOTE: ${{ secrets.SFTP_TEMPLATE_REMOTE }}
          SFTP_CSS_REMOTE_FILE: ${{ secrets.SFTP_CSS_REMOTE_FILE }}
        run: python scripts/volusion_sftp_deploy.py

      - name: Verify SFTP + live template marker
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_TEMPLATE_REMOTE: ${{ secrets.SFTP_TEMPLATE_REMOTE }}
        run: python scripts/volusion_sftp_verify_template.py
