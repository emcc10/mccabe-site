name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/packages-microsoft-com-prod.list
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Verify local files exist
        run: |
          echo "Repo root:"
          pwd
          echo "Latest commit:"
          git log -1 --oneline

          test -f template_266.html || (echo "ERROR: template_266.html missing" && exit 1)
          test -f vspfiles/css/custom-safe.css || (echo "ERROR: vspfiles/css/custom-safe.css missing" && exit 1)
          test -f vspfiles/templates/266/css/mccabe-overrides.css || (echo "ERROR: vspfiles/templates/266/css/mccabe-overrides.css missing" && exit 1)

          echo "Required files found."

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test Volusion SFTP port
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "Testing port 2222..."
          nc -vz -w 20 "$FTP_SERVER" 2222

      - name: Deploy files to Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 120
          set net:max-retries 3
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit yes

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Uploading template to /template_266.html..."
          put template_266.html -o /template_266.html

          echo "Uploading template backup to /v/template_266.html..."
          put template_266.html -o /v/template_266.html

          echo "Uploading custom-safe.css..."
          put vspfiles/css/custom-safe.css -o /vspfiles/css/custom-safe.css

          echo "Trying mccabe-overrides.css..."
          set cmd:fail-exit no
          put vspfiles/templates/266/css/mccabe-overrides.css -o /vspfiles/templates/266/css/mccabe-overrides.css
          set cmd:fail-exit yes

          echo "Deploy complete. If mccabe-overrides.css was locked, rerun later."

          bye
          EOF
