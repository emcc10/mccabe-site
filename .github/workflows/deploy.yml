name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Lets you run "Deploy Volusion Theme" manually from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:      
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy HTML templates
        uses: SamKirkland/FTP-Deploy-Action@v3.1.1
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: vspfiles/templates/266/
          server-dir: /vspfiles/templates/266/

      - name: Deploy CSS
        uses: SamKirkland/FTP-Deploy-Action@v3.1.1
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: vspfiles/css/
          server-dir: /vspfiles/css/

      - name: Deploy JS
        uses: SamKirkland/FTP-Deploy-Action@v3.1.1
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: vspfiles/templates/266/js/
          server-dir: /vspfiles/templates/266/js/
