# SFTP deploy: uses secrets FTP_SERVER, FTP_USERNAME, FTP_PASSWORD (port 2222)
# Template at v/template_266.html. Assets under v/vspfiles/.
name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      remote_path:
        description: "Remote path for vspfiles (e.g. v/vspfiles/ or vspfiles/)"
        required: false
        default: "v/vspfiles/"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        run: |
          if [ -z "$FTP_SERVER" ]; then echo "::error::FTP_SERVER secret is not set in GitHub. Add it in repo Settings → Secrets and variables → Actions."; exit 1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::FTP_USERNAME secret is not set."; exit 1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::FTP_PASSWORD secret is not set."; exit 1; fi
          echo "Secrets are set. Deploying to $FTP_SERVER (port 2222)."

      - name: Show what we're deploying
        run: |
          echo "Template (to remote root):"
          ls -la template_266.html 2>/dev/null || true
          echo "Contents of vspfiles/ (to wwwroot/v/vspfiles/):"
          find vspfiles -type f | head -40
          ls -la vspfiles/css/custom-safe.css 2>/dev/null || true

      - name: Show exact remote paths (for FileZilla comparison)
        run: |
          echo "Remote paths are relative to your SFTP user's HOME directory."
          echo "Template will be uploaded to:  wwwroot/v/template_266.html"
          echo "vspfiles will be uploaded to:  wwwroot/v/vspfiles/"
          echo "So custom-safe.css lands at:   wwwroot/v/vspfiles/css/custom-safe.css"
          echo ""
          echo "In FileZilla: after login, open wwwroot/v/vspfiles/css/custom-safe.css and check that Modified time is NOW after this run."

      - name: Deploy via SFTP
        uses: Dylan700/sftp-upload-action@v1.2.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: "2222"
          uploads: |
            template_266.html => wwwroot/v/
            vspfiles/ => wwwroot/v/vspfiles/

      - name: Deploy summary
        run: |
          echo "If the job succeeded, the files were written to the paths above."
          echo "Check FileZilla at: wwwroot/v/vspfiles/css/custom-safe.css"
