name: Deploy Volusion Template

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      SFTP_PORT: ${{ secrets.SFTP_PORT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          [ -n "$FTP_SERVER" ] || (echo "::error::FTP_SERVER missing" && exit 1)
          [ -n "$FTP_USERNAME" ] || (echo "::error::FTP_USERNAME missing" && exit 1)
          [ -n "$FTP_PASSWORD" ] || (echo "::error::FTP_PASSWORD missing" && exit 1)
          [ -n "$SFTP_PORT" ] || (echo "::error::SFTP_PORT missing" && exit 1)
          echo "Server: $FTP_SERVER"
          echo "User: $FTP_USERNAME"
          echo "Port: $SFTP_PORT"

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Show local file
        run: |
          pwd
          ls -la
          ls -la deploy-template
          ls -la deploy-template/template_266.html

      - name: Upload template_266.html via SFTP
        run: |
          lftp -d -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":"$SFTP_PORT" <<EOF
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 1
          set cmd:fail-exit yes
          pwd
          ls
          put deploy-template/template_266.html -o /v/template_266.html
          ls -l /v/template_266.html
          bye
          EOF
