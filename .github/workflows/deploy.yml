name: Deploy to Volusion

# Match scripts/upload_template_css.ps1: template → remote / , CSS → /vspfiles/css/
# (SFTP "root" is usually the same folder the storefront exposes as /v/ on the web.)

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
      - 'vspfiles/css/custom-safe.css'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload template and CSS via SFTP (port 2222)
        env:
          SECRET_SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SECRET_FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          # Optional: remote folder that already contains template_266.html (cd here, then vspfiles/css for CSS).
          SFTP_ROOT_V: ${{ secrets.SFTP_ROOT_V }}
        run: |
          set -euo pipefail
          SFTP_HOST="${SECRET_SFTP_HOST:-}"
          if [ -z "$SFTP_HOST" ]; then
            SFTP_HOST="${SECRET_FTP_HOST:-}"
          fi
          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Missing secrets. Set SFTP_HOST (or FTP_HOST), FTP_USERNAME, and FTP_PASSWORD."
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          echo "Deploying to ${SFTP_HOST}:2222"
          echo "  template_266.html → remote / (see upload_template_css.ps1)"
          echo "  custom-safe.css → remote /vspfiles/css/"
          echo "  Local sizes: template $(wc -c < template_266.html | tr -d ' ') bytes; css $(wc -c < vspfiles/css/custom-safe.css | tr -d ' ') bytes"

          run_sftp_batch() {
            local batch="$1"
            sshpass -p "$SFTP_PASS" sftp -b "$batch" \
              -oBatchMode=no \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -P 2222 \
              "$SFTP_USER@$SFTP_HOST"
          }

          echo "::group::SFTP after login: pwd + ls -la"
          diag="$(mktemp)"
          printf '%s\n' 'pwd' 'ls -la' 'bye' > "$diag"
          run_sftp_batch "$diag" || true
          rm -f "$diag"
          echo "::endgroup::"

          try_batch() {
            local title="$1"
            shift
            local batch
            batch="$(mktemp)"
            printf '%s\n' "$@" > "$batch"
            echo "::group::Try: $title"
            if run_sftp_batch "$batch"; then
              echo "::endgroup::"
              rm -f "$batch"
              return 0
            fi
            echo "::endgroup::"
            rm -f "$batch"
            return 1
          }

          try_under_v_root() {
            local root="$1"
            try_batch "cd $root then template + vspfiles/css" \
              "cd $root" \
              "put template_266.html template_266.html" \
              "ls -l template_266.html" \
              "cd vspfiles/css" \
              "put vspfiles/css/custom-safe.css custom-safe.css" \
              "ls -l custom-safe.css" \
              "bye"
          }

          ok=0
          if [ -n "${SFTP_ROOT_V:-}" ]; then
            if try_under_v_root "$SFTP_ROOT_V"; then ok=1; fi
          else
            # Same paths as scripts/upload_template_css.ps1 (Posh-SSH -Destination '/' and '/vspfiles/css/')
            if try_batch "cd / → template_266.html + /vspfiles/css/custom-safe.css" \
              "cd /" \
              "put template_266.html template_266.html" \
              "ls -l template_266.html" \
              "cd /vspfiles/css" \
              "put vspfiles/css/custom-safe.css custom-safe.css" \
              "ls -l custom-safe.css" \
              "bye"; then ok=1; fi

            if [ "$ok" -ne 1 ]; then
              if try_batch "login cwd → template + vspfiles/css (relative)" \
                "put template_266.html template_266.html" \
                "ls -l template_266.html" \
                "cd vspfiles/css" \
                "put vspfiles/css/custom-safe.css custom-safe.css" \
                "ls -l custom-safe.css" \
                "bye"; then ok=1; fi
            fi

            if [ "$ok" -ne 1 ]; then
              for root in "/mccabestheaterandliving.com/v" "/v" "v"; do
                if try_under_v_root "$root"; then ok=1; break; fi
              done
            fi
          fi

          if [ "$ok" -ne 1 ]; then
            echo "::error::All SFTP path attempts failed."
            echo "::error::Compare the 'pwd + ls -la' group above with FileZilla. Set secret SFTP_ROOT_V to the remote path of the folder that contains template_266.html (then we use …/vspfiles/css for CSS)."
            exit 1
          fi
          echo "::notice::Upload finished. Confirm on the live site with your MC_DEPLOY_VERIFY token."
