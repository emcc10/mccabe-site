name: Deploy to Volusion

on:
  push:
    branches:
      - main
    # Only deploy when Volusion-facing files change (not sofa-recolor / render-cache only).
    paths:
      - "template_266.html"
      - "vspfiles/**"
      - ".github/workflows/deploy.yml"
      - ".github/scripts/deploy-volusion.sh"
      - "scripts/deploy_volusion_assets.py"
      - "scripts/volusion_sftp_force_template.py"
      - "scripts/verify_template_sftp.py"
      - "scripts/verify_custom_safe_sftp.py"
      - "scripts/upload_boards_canonical.py"
      - "scripts/announce_deploy_markers.py"
  workflow_dispatch:
    inputs:
      upload_plp_photos:
        description: Upload all PLP photos via SFTP (slow; ~160 files)
        type: boolean
        default: false

# Queue deploys — do NOT cancel in-progress (rapid pushes were killing uploads mid-flight).
concurrency:
  group: deploy-volusion-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove problematic Microsoft/Azure apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install lftp, Python SFTP, and netcat
        run: |
          sudo apt-get install -y lftp netcat-openbsd openssh-client python3-pip
          pip3 install paramiko

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Deploy to Volusion (template + assets; SFTP verify is the gate)
        id: deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SKIP_TEMPLATE_DEPLOY: "0"
          SKIP_PLP_PHOTOS: ${{ github.event_name == 'push' && '1' || (inputs.upload_plp_photos == false && '1' || '0') }}
        run: bash .github/scripts/deploy-volusion.sh

      - name: Verify live storefront (informational — CDN/baked HTML often lags SFTP)
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: python3 scripts/verify_live_plp_deploy.py --soft

      - name: Deploy summary
        if: always()
        run: |
          echo "Deploy step: ${{ steps.deploy.outcome }}"
          echo ""
          echo "WHEN DEPLOY RUNS:"
          echo "  - Push to main that touches template_266.html, vspfiles/**, or deploy scripts"
          echo "  - OR: Actions → Deploy to Volusion → Run workflow (always uploads)"
          echo ""
          echo "WHEN DEPLOY IS SKIPPED:"
          echo "  - Push only changes public/, src/, sofa-recolor-tool/, docs — use workflow_dispatch"
          echo ""
          echo "AFTER GREEN SFTP:"
          echo "  Volusion Design → File Editor → template_266.html → Save (rebake PDP/category HTML)"
          echo "  Hard-refresh PDP (Ctrl+Shift+R) or purge Cloudflare for /v/vspfiles/css/custom-safe.css"
