name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Verify local files exist
        run: |
          echo "Repo root:"
          pwd
          echo "Files:"
          ls -la
          echo "Checking expected files..."
          test -f template_266.html
          test -f vspfiles/css/custom-safe.css

      - name: Deploy files to Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222 <<EOF
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set xfer:clobber yes

          put template_266.html -o /v/template_266.html

          mkdir -p /v/vspfiles/css
          put vspfiles/css/custom-safe.css -o /v/vspfiles/css/custom-safe.css

          bye
          EOF
