name: Deploy Volusion template + custom-safe.css

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Verify local template exists
        run: |
          echo "Repo root:"
          pwd

          echo "Latest commit:"
          git log -1 --oneline

          echo "Checking template file..."
          if [ ! -f "template_266.html" ]; then
            echo "ERROR: template_266.html is missing from repo root"
            exit 1
          fi

          echo "Checking custom-safe.css (browser loads this AFTER template — must deploy or header fixes never apply)..."
          if [ ! -f "vspfiles/css/custom-safe.css" ]; then
            echo "ERROR: vspfiles/css/custom-safe.css is missing"
            exit 1
          fi

          echo "Template found."
          echo "First 20 lines of local template:"
          head -20 template_266.html

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test SFTP port
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "Testing port 2222..."
          nc -vz -w 20 "$FTP_SERVER" 2222

      - name: Deploy template + custom-safe.css to Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 90
          set net:max-retries 2
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit yes

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Uploading template to /v/template_266.html..."
          put template_266.html -o /v/template_266.html

          echo "Uploading template to /template_266.html..."
          put template_266.html -o /template_266.html

          echo "Uploading vspfiles/css/custom-safe.css to /v/vspfiles/css/custom-safe.css (same URL template loads)..."
          put vspfiles/css/custom-safe.css -o /v/vspfiles/css/custom-safe.css

          echo "Uploading optional fallback /vspfiles/css/custom-safe.css (template onerror)..."
          set cmd:fail-exit no
          put vspfiles/css/custom-safe.css -o /vspfiles/css/custom-safe.css
          set cmd:fail-exit yes

          echo "Downloading uploaded files back for verification..."
          get /v/template_266.html -o remote-v-template_266.html
          get /template_266.html -o remote-root-template_266.html
          get /v/vspfiles/css/custom-safe.css -o remote-custom-safe.css

          bye
          EOF

          echo "Remote /v/template_266.html first 20 lines:"
          head -20 remote-v-template_266.html || true

          echo "Remote /template_266.html first 20 lines:"
          head -20 remote-root-template_266.html || true

          echo "Checking template deploy marker (HTML comment)..."
          grep -n "MC_DEPLOY_VERIFY" remote-v-template_266.html || true
          grep -n "MC_DEPLOY_VERIFY" remote-root-template_266.html || true

          echo "Checking CSS deploy marker..."
          grep -n "MC_CSS_DEPLOY_VERIFY" remote-custom-safe.css || {
            echo "ERROR: MC_CSS_DEPLOY_VERIFY missing from downloaded /v/vspfiles/css/custom-safe.css — upload path wrong or get failed"
            exit 1
          }
