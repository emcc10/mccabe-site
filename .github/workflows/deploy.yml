name: Deploy to Volusion

on:
  push:
    branches:
      - main
    # Avoid a 5+ min Volusion SFTP deploy on every render/package-only commit.
    paths:
      - "vspfiles/**"
      - "template_266.html"
      - ".github/scripts/**"
      - ".github/workflows/deploy.yml"
      - "scripts/deploy_volusion_assets.py"
      - "scripts/verify_*.py"
      - "scripts/upload_*.py"
      - "scripts/replace_plp_photo_mats.py"
      - "scripts/volusion_sftp_*.py"
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch or tag to deploy (e.g. main, phase1-test-sofa)
        type: string
        default: main
      upload_plp_photos:
        description: Upload all PLP photos via SFTP (slow; ~160 files)
        type: boolean
        default: false

# Queue deploys — never cancel mid-upload (parallel/cancelled runs corrupt SFTP files).
concurrency:
  group: deploy-volusion-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref }}
          fetch-depth: 2

      - name: Deploy context
        run: |
          echo "=== Deploy context ==="
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref_name }}"
          echo "SHA: $(git rev-parse --short HEAD)"
          echo "CSS marker: $(head -1 vspfiles/css/custom-safe.css 2>/dev/null || echo missing)"
          echo "Template: $(wc -c < template_266.html 2>/dev/null || echo 0) bytes"

      - name: Remove problematic Microsoft/Azure apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install lftp, Python SFTP, and netcat
        run: |
          sudo apt-get install -y lftp netcat-openbsd openssh-client python3-pip
          pip3 install paramiko

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Detect PLP photo changes (push only)
        if: github.event_name == 'push'
        id: photos_changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || true)
          fi
          if [ -n "$BEFORE" ] && git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'vspfiles/photos/' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect deploy file changes (push only)
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || true)
          fi
          if [ -n "$BEFORE" ] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            {
              echo "DEPLOY_CHANGED_ONLY=1"
              echo "DEPLOY_CHANGED_FILES<<EOF"
              git diff --name-only "$BEFORE" "${{ github.sha }}" -- \
                'template_266.html' \
                'vspfiles/**' \
                '.github/scripts/**' \
                '.github/workflows/deploy.yml' \
                'scripts/deploy_volusion_assets.py' \
                'scripts/verify_*.py' \
                'scripts/upload_*.py' \
                'scripts/replace_plp_photo_mats.py' \
                'scripts/volusion_sftp_*.py'
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "::warning::Could not resolve previous commit for changed-file deploy; deploying full tracked asset set."
            echo "DEPLOY_CHANGED_ONLY=0" >> "$GITHUB_ENV"
          fi

      - name: Deploy to Volusion (SFTP + verify — job fails if upload fails)
        id: deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SKIP_TEMPLATE_DEPLOY: "0"
          DEPLOY_STRICT: "1"
          SKIP_PLP_PHOTOS: ${{ github.event_name == 'push' && steps.photos_changed.outputs.changed != 'true' && '1' || (github.event_name == 'workflow_dispatch' && inputs.upload_plp_photos == false && '1' || '0') }}
        run: bash .github/scripts/deploy-volusion.sh

      - name: Verify live storefront (informational)
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: python3 scripts/verify_live_plp_deploy.py --soft

      - name: Deploy summary
        if: always()
        run: |
          echo "Deploy: ${{ steps.deploy.outcome }}"
          if [ "${{ steps.deploy.outcome }}" != "success" ]; then
            echo "::error::Deploy failed — live site was NOT fully updated. Open the log above for ::error lines."
            exit 1
          fi
          echo ""
          echo "Green if log contains: SFTP custom-safe OK, MC_PDP_JS_SFTP_CANONICAL_OK (HTTP is warning-only when runner gets 403)"
          echo "Quick browser checks:"
          echo "  fetch('/v/vspfiles/js/mc-pdp-auth-cta-fix.js?'+Date.now()).then(r=>r.text()).then(t=>console.log(t.includes('mcEnsurePdpPriceStack')))"
          echo "  fetch('/v/vspfiles/js/mc-pdp-price-stack.js?'+Date.now()).then(r=>console.log(r.status))"
          echo "Rebake: Volusion Design → File Editor → template_266.html → Save (for template/baked .htm changes)"
