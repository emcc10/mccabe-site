name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Verify local files exist
        run: |
          echo "Repo root:"
          pwd

          echo "Latest commit:"
          git log -1 --oneline

          if [ ! -f "template_266.html" ]; then
            echo "ERROR: template_266.html is missing from repo root"
            exit 1
          fi

          if [ ! -f "vspfiles/css/custom-safe.css" ]; then
            echo "ERROR: vspfiles/css/custom-safe.css is missing"
            exit 1
          fi

          echo "Required files found."

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test Volusion connection ports
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "Testing port 2222..."
          if nc -vz -w 20 "$FTP_SERVER" 2222; then
            echo "PORT_2222_OPEN=true" >> $GITHUB_ENV
          else
            echo "PORT_2222_OPEN=false" >> $GITHUB_ENV
          fi

          echo "Testing port 21..."
          if nc -vz -w 20 "$FTP_SERVER" 21; then
            echo "PORT_21_OPEN=true" >> $GITHUB_ENV
          else
            echo "PORT_21_OPEN=false" >> $GITHUB_ENV
          fi

      - name: Deploy files to Volusion (multi-path mirror)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          PORT_2222_OPEN: ${{ env.PORT_2222_OPEN }}
        run: |
          echo "PORT_2222_OPEN=$PORT_2222_OPEN"

          if [ "$PORT_2222_OPEN" != "true" ]; then
            echo "ERROR: Port 2222 is not open. Do not deploy."
            exit 1
          fi

          # scripts/volusion_sftp_deploy.py mirrors template + CSS (and theme files) to every path
          # Volusion SFTP layouts use: absolute /v/..., chroot-relative vspfiles/..., domain-prefixed, etc.
          # A single lftp put to /v/... often writes a nested folder the live store never serves.
          python3 -m pip install --quiet paramiko

          export SFTP_HOST="$FTP_SERVER"
          export SFTP_USER="$FTP_USERNAME"
          export SFTP_PASS="$FTP_PASSWORD"
          export SFTP_PORT="2222"

          python3 scripts/volusion_sftp_deploy.py

      - name: Verify markers (download from likely SFTP paths)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          rm -f mc-remote-tpl-*.html mc-remote-css-*.css
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 90
          set cmd:fail-exit no
          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222
          get /v/template_266.html -o mc-remote-tpl-v.html
          get /template_266.html -o mc-remote-tpl-root.html
          get template_266.html -o mc-remote-tpl-home.html
          get /v/v/template_266.html -o mc-remote-tpl-vv.html
          get /v/vspfiles/css/custom-safe.css -o mc-remote-css-vv.css
          get /vspfiles/css/custom-safe.css -o mc-remote-css-vs.css
          get vspfiles/css/custom-safe.css -o mc-remote-css-rel.css
          get v/vspfiles/css/custom-safe.css -o mc-remote-css-vrel.css
          bye
          EOF

          TPL_OK=
          for f in mc-remote-tpl-v.html mc-remote-tpl-root.html mc-remote-tpl-home.html mc-remote-tpl-vv.html; do
            if [ -f "$f" ] && grep -q "MC_DEPLOY_VERIFY_20260428pydeploy" "$f" 2>/dev/null; then
              echo "OK: template marker found in $f"
              TPL_OK=1
              break
            fi
          done
          if [ -z "$TPL_OK" ]; then
            echo "ERROR: MC_DEPLOY_VERIFY_20260428pydeploy not found in any downloaded template copy."
            ls -la mc-remote-tpl-*.html 2>/dev/null || true
            exit 1
          fi

          CSS_OK=
          for f in mc-remote-css-vv.css mc-remote-css-vs.css mc-remote-css-rel.css mc-remote-css-vrel.css; do
            if [ -f "$f" ] && grep -q "MC_CSS_DEPLOY_VERIFY_20260428pydeploy" "$f" 2>/dev/null; then
              echo "OK: CSS marker found in $f"
              CSS_OK=1
              head -n 2 "$f"
              break
            fi
          done
          if [ -z "$CSS_OK" ]; then
            echo "ERROR: MC_CSS_DEPLOY_VERIFY_20260428pydeploy not found in any downloaded custom-safe.css."
            ls -la mc-remote-css-*.css 2>/dev/null || true
            exit 1
          fi
