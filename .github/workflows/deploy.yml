name: Deploy to Volusion

# Volusion: template + custom-safe.css in same remote folder (e.g. /v/). Local CSS stays repo path vspfiles/css/custom-safe.css.
# Optional secret SFTP_CSS_SUBDIR=vspfiles/css if your store still uses that subfolder.

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
      - 'vspfiles/css/custom-safe.css'
      - '.github/workflows/deploy.yml'
      - 'scripts/volusion_sftp_deploy.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload template and CSS via SFTP
        env:
          SECRET_SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SECRET_FTP_HOST: ${{ secrets.FTP_HOST }}
          SECRET_SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_ROOT_V: ${{ secrets.SFTP_ROOT_V }}
          SFTP_CSS_SUBDIR: ${{ secrets.SFTP_CSS_SUBDIR }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          echo "::notice::deploy marker 20260330c — CSS default: same folder as template (/v/custom-safe.css)."

          SFTP_HOST="${SECRET_SFTP_HOST:-}"
          if [ -z "$SFTP_HOST" ]; then
            SFTP_HOST="${SECRET_FTP_HOST:-}"
          fi
          SFTP_PORT="${SECRET_SFTP_PORT:-2222}"

          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Missing secrets. Set SFTP_HOST (or FTP_HOST), FTP_USERNAME, and FTP_PASSWORD. Optional: SFTP_PORT (default 2222)."
            exit 1
          fi

          if [ ! -f template_266.html ] || [ ! -f vspfiles/css/custom-safe.css ]; then
            echo "::error::Expected files missing after checkout (template_266.html or vspfiles/css/custom-safe.css)."
            ls -la
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass python3-pip

          export SSHPASS="${SFTP_PASS}"
          CSS_REL="${SFTP_CSS_SUBDIR:-}"

          echo "Deploying sftp://${SFTP_HOST}:${SFTP_PORT} as ${SFTP_USER}"
          echo "Local template: $(wc -c < template_266.html | tr -d ' ') bytes; css: $(wc -c < vspfiles/css/custom-safe.css | tr -d ' ') bytes"
          if [ -n "${CSS_REL}" ]; then
            echo "Remote CSS path: <template-root>/${CSS_REL}/custom-safe.css (legacy subdir)"
          else
            echo "Remote CSS path: <template-root>/custom-safe.css (same folder as template)"
          fi

          TCP_OK=0
          echo "::group::Network: can this runner reach ${SFTP_HOST}:${SFTP_PORT}?"
          if timeout 15 bash -c "cat < /dev/null > /dev/tcp/${SFTP_HOST}/${SFTP_PORT}" 2>/dev/null; then
            TCP_OK=1
            echo "TCP probe: port is open (connection accepted)."
          else
            echo "::warning::TCP probe failed (timeout or connection refused). Volusion or a firewall may block GitHub Actions IPs; FileZilla from home can still work."
          fi
          echo "::endgroup::"

          # Use -o User=; disable agent/keys so sshpass is not confused by offered keys.
          run_sftp_once() {
            local batch="$1"
            shift
            sshpass -e sftp -4 -v -b "$batch" \
              -oBatchMode=no \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o IdentityAgent=none \
              -o IdentitiesOnly=yes \
              -o "User=${SFTP_USER}" \
              -o PubkeyAuthentication=no \
              "$@" \
              -P "${SFTP_PORT}" \
              "${SFTP_HOST}"
          }

          run_sftp_batch() {
            local batch="$1"
            local auth
            for auth in "password" "keyboard-interactive,password" "password,keyboard-interactive" "keyboard-interactive"; do
              echo "::group::OpenSSH SFTP PreferredAuthentications=${auth} (modern keys)"
              if run_sftp_once "$batch" -o "PreferredAuthentications=${auth}" -o HostKeyAlgorithms=+ssh-rsa; then
                echo "::endgroup::"
                return 0
              fi
              echo "::endgroup::"
              echo "::group::OpenSSH SFTP PreferredAuthentications=${auth} (legacy KEX/ciphers)"
              if run_sftp_once "$batch" -o "PreferredAuthentications=${auth}" \
                -o HostKeyAlgorithms=+ssh-rsa,ssh-ed25519,ecdsa-sha2-nistp256,ecdsa-sha2-nistp384,ecdsa-sha2-nistp521 \
                -o KexAlgorithms=+diffie-hellman-group-exchange-sha256,diffie-hellman-group14-sha1,diffie-hellman-group1-sha1 \
                -o Ciphers=+aes128-ctr,aes192-ctr,aes256-ctr,aes128-cbc,aes256-cbc,3des-cbc; then
                echo "::endgroup::"
                return 0
              fi
              echo "::endgroup::"
            done
            return 1
          }

          echo "::group::SFTP login check (pwd, ls)"
          diag="$(mktemp)"
          printf '%s\n' 'pwd' 'ls' 'bye' > "$diag"
          if ! run_sftp_batch "$diag"; then
            rm -f "$diag"
            echo "::endgroup::"
            echo "::warning::OpenSSH+sshpass could not log in. Trying Paramiko (different SSH stack; same secrets)."
            if ! python3 -m pip install -q paramiko --break-system-packages; then
              echo "::error::pip install paramiko failed on the runner."
              exit 1
            fi
            export SFTP_HOST SFTP_PORT
            set +e
            python3 scripts/volusion_sftp_deploy.py
            pm_rc=$?
            set -e
            if [ "$pm_rc" -eq 0 ]; then
              echo "::notice::Deploy finished via Paramiko. Confirm live site with MC_DEPLOY_VERIFY."
              exit 0
            fi
            if [ "$pm_rc" -eq 1 ]; then
              echo "::error::Paramiko connected but no remote path worked. Set SFTP_ROOT_V (often /v). Optional SFTP_CSS_SUBDIR=vspfiles/css if CSS is not beside the template."
            else
              echo "::error::Paramiko could not connect or authenticate. TCP probe: $([ "${TCP_OK}" = 1 ] && echo OK || echo FAILED). Match FTP_USERNAME/FTP_PASSWORD to FileZilla; ask Volusion if SFTP from cloud IPs is restricted."
            fi
            exit 1
          fi
          rm -f "$diag"
          echo "::endgroup::"

          try_batch() {
            local title="$1"
            shift
            local batch
            batch="$(mktemp)"
            printf '%s\n' "$@" > "$batch"
            echo "::group::Try: $title"
            echo "Batch commands:"
            sed 's/^/  /' "$batch"
            if run_sftp_batch "$batch"; then
              echo "::endgroup::"
              rm -f "$batch"
              return 0
            fi
            echo "::endgroup::"
            rm -f "$batch"
            return 1
          }

          try_under_root() {
            local root="$1"
            root="${root%/}"
            if [ -n "${CSS_REL}" ]; then
              try_batch "cd ${root} → template + ${CSS_REL}/custom-safe.css" \
                "cd ${root}" \
                "put template_266.html template_266.html" \
                "cd ${CSS_REL}" \
                "put vspfiles/css/custom-safe.css custom-safe.css" \
                "bye"
            else
              local t_rem c_rem
              t_rem="${root}/template_266.html"
              c_rem="${root}/custom-safe.css"
              t_rem=$(echo "$t_rem" | sed 's#//#/#g')
              c_rem=$(echo "$c_rem" | sed 's#//#/#g')
              try_batch "absolute ${t_rem} + ${c_rem}" \
                "put template_266.html ${t_rem}" \
                "put vspfiles/css/custom-safe.css ${c_rem}" \
                "bye"
            fi
          }

          ok=0
          if [ -n "${SFTP_ROOT_V:-}" ]; then
            if try_under_root "${SFTP_ROOT_V}"; then ok=1; fi
          else
            if try_under_root "/v"; then ok=1; fi

            if [ "$ok" -ne 1 ]; then
              if [ -n "${CSS_REL}" ]; then
                if try_batch "cd / → template + /${CSS_REL}" \
                  "cd /" \
                  "put template_266.html template_266.html" \
                  "cd /${CSS_REL}" \
                  "put vspfiles/css/custom-safe.css custom-safe.css" \
                  "bye"; then ok=1; fi
              else
                if try_batch "absolute /template_266.html + /custom-safe.css" \
                  "put template_266.html /template_266.html" \
                  "put vspfiles/css/custom-safe.css /custom-safe.css" \
                  "bye"; then ok=1; fi
              fi
            fi

            if [ "$ok" -ne 1 ]; then
              if [ -n "${CSS_REL}" ]; then
                if try_batch "login cwd → template + ${CSS_REL}" \
                  "put template_266.html template_266.html" \
                  "cd ${CSS_REL}" \
                  "put vspfiles/css/custom-safe.css custom-safe.css" \
                  "bye"; then ok=1; fi
              else
                if try_batch "login cwd → template + custom-safe.css (same folder)" \
                  "put template_266.html template_266.html" \
                  "put vspfiles/css/custom-safe.css custom-safe.css" \
                  "bye"; then ok=1; fi
              fi
            fi

            if [ "$ok" -ne 1 ]; then
              for root in "/mccabestheaterandliving.com/v" "v"; do
                if try_under_root "$root"; then ok=1; break; fi
              done
            fi
          fi

          if [ "$ok" -ne 1 ]; then
            echo "::error::All SFTP upload attempts failed (see -v output for paths/permissions)."
            echo "::error::Set SFTP_ROOT_V to FileZilla path for the folder with template_266.html. Set SFTP_CSS_SUBDIR=vspfiles/css only if CSS is not beside the template."
            exit 1
          fi
          echo "::notice::Upload finished. Confirm on the live site with your MC_DEPLOY_VERIFY token."
