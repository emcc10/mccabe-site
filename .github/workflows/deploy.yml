name: Deploy to Volusion

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
      - 'vspfiles/css/custom-safe.css'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload template and CSS via SFTP (port 2222)
        env:
          SECRET_SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SECRET_FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          # Optional: full remote path to the folder that contains template_266.html (see FileZilla).
          # Examples: /mccabestheaterandliving.com/v  or  /v
          SFTP_ROOT_V: ${{ secrets.SFTP_ROOT_V }}
        run: |
          set -euo pipefail
          SFTP_HOST="${SECRET_SFTP_HOST:-}"
          if [ -z "$SFTP_HOST" ]; then
            SFTP_HOST="${SECRET_FTP_HOST:-}"
          fi
          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Missing secrets. Set SFTP_HOST (or FTP_HOST), FTP_USERNAME, and FTP_PASSWORD."
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          echo "Deploying to ${SFTP_HOST}:2222"
          echo "  template_266.html → <root>/template_266.html ($(wc -c < template_266.html | tr -d ' ') bytes)"
          echo "  vspfiles/css/custom-safe.css → <root>/vspfiles/css/custom-safe.css ($(wc -c < vspfiles/css/custom-safe.css | tr -d ' ') bytes)"

          run_sftp_batch() {
            local batch="$1"
            sshpass -p "$SFTP_PASS" sftp -b "$batch" \
              -oBatchMode=no \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -P 2222 \
              "$SFTP_USER@$SFTP_HOST"
          }

          try_remote_v_root() {
            local root="$1"
            local batch
            batch="$(mktemp)"
            # -b batch: abort on first failed command (heredoc does not)
            {
              echo "cd $root"
              echo "put template_266.html template_266.html"
              echo "ls -l template_266.html"
              echo "cd vspfiles/css"
              echo "put vspfiles/css/custom-safe.css custom-safe.css"
              echo "ls -l custom-safe.css"
              echo "bye"
            } > "$batch"
            echo "::group::SFTP try: cd $root"
            if run_sftp_batch "$batch"; then
              echo "::endgroup::"
              echo "::notice::Upload OK under remote folder: $root"
              rm -f "$batch"
              return 0
            fi
            echo "::endgroup::"
            rm -f "$batch"
            return 1
          }

          if [ -n "${SFTP_ROOT_V:-}" ]; then
            try_remote_v_root "$SFTP_ROOT_V"
          else
            ok=0
            for root in "/mccabestheaterandliving.com/v" "/v" "v"; do
              if try_remote_v_root "$root"; then ok=1; break; fi
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::SFTP could not upload using /mccabestheaterandliving.com/v, /v, or v (relative)."
              echo "::error::In FileZilla, open the folder that contains template_266.html, note the remote path, and add GitHub secret SFTP_ROOT_V with that full path (e.g. /yourstore.com/v)."
              exit 1
            fi
          fi
