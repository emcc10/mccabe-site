name: Deploy Volusion Theme (SFTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy HTML templates
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: templates/266/
          remote_path: /vspfiles/templates/266/

      - name: Deploy CSS
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: css/
          remote_path: /vspfiles/css/

      - name: Deploy JS
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: js/
          remote_path: /vspfiles/js/
