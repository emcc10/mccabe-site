name: Deploy to Volusion

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload template via SFTP (port 2222)
        env:
          SECRET_SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SECRET_FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          SFTP_HOST="${SECRET_SFTP_HOST:-}"
          if [ -z "$SFTP_HOST" ]; then
            SFTP_HOST="${SECRET_FTP_HOST:-}"
          fi
          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Missing secrets. Set SFTP_HOST (or FTP_HOST), FTP_USERNAME, and FTP_PASSWORD."
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          sshpass -p "$SFTP_PASS" sftp \
            -oBatchMode=no \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P 2222 \
            "$SFTP_USER@$SFTP_HOST" << 'EOSFTP'
          cd /vspfiles/templates/template_266
          put template_266.html template_266.html
          bye
          EOSFTP
