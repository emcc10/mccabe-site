name: Deploy to Volusion

# Volusion (typical): SFTP host + port 2222 in secrets; store file root is /v → template_266.html and /v/vspfiles/css/.
# Fallbacks: / (chroot), login cwd, domain-prefixed /…/v (see try order below).

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
      - 'vspfiles/css/custom-safe.css'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload template and CSS via SFTP
        env:
          SECRET_SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SECRET_FTP_HOST: ${{ secrets.FTP_HOST }}
          SECRET_SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_ROOT_V: ${{ secrets.SFTP_ROOT_V }}
          SFTP_CSS_SUBDIR: ${{ secrets.SFTP_CSS_SUBDIR }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          echo "::notice::deploy.yml marker 20260328a — if you do not see this line, GitHub is running an old workflow (push latest main)."

          SFTP_HOST="${SECRET_SFTP_HOST:-}"
          if [ -z "$SFTP_HOST" ]; then
            SFTP_HOST="${SECRET_FTP_HOST:-}"
          fi
          SFTP_PORT="${SECRET_SFTP_PORT:-2222}"

          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Missing secrets. Set SFTP_HOST (or FTP_HOST), FTP_USERNAME, and FTP_PASSWORD. Optional: SFTP_PORT (default 2222)."
            exit 1
          fi

          if [ ! -f template_266.html ] || [ ! -f vspfiles/css/custom-safe.css ]; then
            echo "::error::Expected files missing after checkout (template_266.html or vspfiles/css/custom-safe.css)."
            ls -la
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          export SSHPASS="${SFTP_PASS}"
          CSS_REL="${SFTP_CSS_SUBDIR:-vspfiles/css}"

          echo "Deploying sftp://${SFTP_HOST}:${SFTP_PORT} as ${SFTP_USER}"
          echo "Local template: $(wc -c < template_266.html | tr -d ' ') bytes; css: $(wc -c < vspfiles/css/custom-safe.css | tr -d ' ') bytes"
          echo "Remote CSS subdir (under template root): ${CSS_REL}"

          TCP_OK=0
          echo "::group::Network: can this runner reach ${SFTP_HOST}:${SFTP_PORT}?"
          if timeout 15 bash -c "cat < /dev/null > /dev/tcp/${SFTP_HOST}/${SFTP_PORT}" 2>/dev/null; then
            TCP_OK=1
            echo "TCP probe: port is open (connection accepted)."
          else
            echo "::warning::TCP probe failed (timeout or connection refused). Volusion or a firewall may block GitHub Actions IPs; FileZilla from home can still work."
          fi
          echo "::endgroup::"

          # Use -o User= so host is never parsed as part of the name (harmless when username has no @).
          # Many FTP/SFTP appliances use keyboard-interactive; try it before plain password.
          # Retry with weaker KEX/ciphers if the first handshake fails (common on older Volusion nodes).
          run_sftp_once() {
            local batch="$1"
            shift
            sshpass -e sftp -4 -v -b "$batch" \
              -oBatchMode=no \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o "User=${SFTP_USER}" \
              -o PreferredAuthentications=keyboard-interactive,password \
              -o PubkeyAuthentication=no \
              "$@" \
              -P "${SFTP_PORT}" \
              "${SFTP_HOST}"
          }

          run_sftp_batch() {
            local batch="$1"
            if run_sftp_once "$batch" -o HostKeyAlgorithms=+ssh-rsa; then
              return 0
            fi
            echo "::warning::SFTP retry with older SSH algorithms (KEX/ciphers)…"
            if run_sftp_once "$batch" \
              -o HostKeyAlgorithms=+ssh-rsa,ssh-ed25519,ecdsa-sha2-nistp256,ecdsa-sha2-nistp384,ecdsa-sha2-nistp521 \
              -o KexAlgorithms=+diffie-hellman-group-exchange-sha256,diffie-hellman-group14-sha1,diffie-hellman-group1-sha1 \
              -o Ciphers=+aes128-ctr,aes192-ctr,aes256-ctr,aes128-cbc,aes256-cbc,3des-cbc; then
              return 0
            fi
            return 1
          }

          echo "::group::SFTP login check (pwd, ls)"
          diag="$(mktemp)"
          printf '%s\n' 'pwd' 'ls' 'bye' > "$diag"
          if ! run_sftp_batch "$diag"; then
            rm -f "$diag"
            echo "::endgroup::"
            echo "::error::SFTP login failed. TCP probe: $([ "${TCP_OK}" = 1 ] && echo OK || echo FAILED). If TCP=FAILED: Volusion/firewall may block GitHub IPs (FileZilla from home can still work). If TCP=OK: compare secrets to FileZilla (no spaces); open the log above and search for Permission denied, Unable to negotiate, or Connection reset."
            exit 1
          fi
          rm -f "$diag"
          echo "::endgroup::"

          try_batch() {
            local title="$1"
            shift
            local batch
            batch="$(mktemp)"
            printf '%s\n' "$@" > "$batch"
            echo "::group::Try: $title"
            echo "Batch commands:"
            sed 's/^/  /' "$batch"
            if run_sftp_batch "$batch"; then
              echo "::endgroup::"
              rm -f "$batch"
              return 0
            fi
            echo "::endgroup::"
            rm -f "$batch"
            return 1
          }

          try_under_root() {
            local root="$1"
            try_batch "cd ${root} → template + ${CSS_REL}" \
              "cd ${root}" \
              "put template_266.html template_266.html" \
              "cd ${CSS_REL}" \
              "put vspfiles/css/custom-safe.css custom-safe.css" \
              "bye"
          }

          ok=0
          if [ -n "${SFTP_ROOT_V:-}" ]; then
            if try_under_root "${SFTP_ROOT_V}"; then ok=1; fi
          else
            # Volusion: official store SFTP root is often /v (template here, css under vspfiles/css).
            if try_under_root "/v"; then ok=1; fi

            if [ "$ok" -ne 1 ]; then
              if try_batch "cd / → template + /${CSS_REL} (chroot may map / to store root)" \
                "cd /" \
                "put template_266.html template_266.html" \
                "cd /${CSS_REL}" \
                "put vspfiles/css/custom-safe.css custom-safe.css" \
                "bye"; then ok=1; fi
            fi

            if [ "$ok" -ne 1 ]; then
              if try_batch "login cwd → template + relative ${CSS_REL}" \
                "put template_266.html template_266.html" \
                "cd ${CSS_REL}" \
                "put vspfiles/css/custom-safe.css custom-safe.css" \
                "bye"; then ok=1; fi
            fi

            if [ "$ok" -ne 1 ]; then
              for root in "/mccabestheaterandliving.com/v" "v"; do
                if try_under_root "$root"; then ok=1; break; fi
              done
            fi
          fi

          if [ "$ok" -ne 1 ]; then
            echo "::error::All SFTP upload attempts failed (see -v output for paths/permissions)."
            echo "::error::Set SFTP_ROOT_V to FileZilla remote path of the folder containing template_266.html. Optional: SFTP_CSS_SUBDIR if css is not under …/vspfiles/css."
            exit 1
          fi
          echo "::notice::Upload finished. Confirm on the live site with your MC_DEPLOY_VERIFY token."
