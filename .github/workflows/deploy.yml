name: Find Real Volusion Template Path

on:
  workflow_dispatch:

jobs:
  find-template-path:
    runs-on: ubuntu-latest

    steps:
      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          nc -vz -w 20 "$FTP_SERVER" 2222

      - name: Search Volusion files for manual marker
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 120
          set net:max-retries 2
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit no

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Downloading likely root/template files..."

          get /template_266.html -o template-root-266.html
          get /template.html -o template-root.html
          get /v/template_266.html -o template-v-266.html
          get /v/template.html -o template-v.html

          get /vspfiles/template_266.html -o template-vspfiles-266.html
          get /vspfiles/template.html -o template-vspfiles.html

          get /vspfiles/templates/266/template_266.html -o template-vspfiles-templates-266.html
          get /vspfiles/templates/266/template.html -o template-vspfiles-templates-template.html
          get /vspfiles/templates/266/template.asp -o template-vspfiles-templates-asp.html
          get /vspfiles/templates/266/template.htm -o template-vspfiles-templates-htm.html

          get /v/vspfiles/templates/266/template_266.html -o template-v-vspfiles-templates-266.html
          get /v/vspfiles/templates/266/template.html -o template-v-vspfiles-templates-template.html
          get /v/vspfiles/templates/266/template.asp -o template-v-vspfiles-templates-asp.html
          get /v/vspfiles/templates/266/template.htm -o template-v-vspfiles-templates-htm.html

          bye
          EOF

          echo "Downloaded files:"
          ls -la template-* || true

          echo "Searching for Volusion editor manual marker..."
          grep -Rni "VOLUSION_EDITOR_MANUAL_MARKER_20260429" template-* || true

          echo "Searching for anything that looks like your current template..."
          grep -Rni "mccabe-overrides\|custom-safe\|mc-mccabe-overrides-body-last\|MC_DEPLOY_VERIFY\|template_266" template-* | head -100 || true
