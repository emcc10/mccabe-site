name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Verify local files exist
        run: |
          echo "Repo root:"
          pwd

          echo "Latest commit:"
          git log -1 --oneline

          if [ ! -f "template_266.html" ]; then
            echo "ERROR: template_266.html is missing from repo root"
            exit 1
          fi

          if [ ! -f "vspfiles/css/custom-safe.css" ]; then
            echo "ERROR: vspfiles/css/custom-safe.css is missing"
            exit 1
          fi

          if [ ! -f "vspfiles/templates/266/css/mccabe-overrides.css" ]; then
            echo "ERROR: vspfiles/templates/266/css/mccabe-overrides.css is missing"
            exit 1
          fi

          echo "Required files found."

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test Volusion connection ports
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "Testing port 2222..."
          if nc -vz -w 20 "$FTP_SERVER" 2222; then
            echo "PORT_2222_OPEN=true" >> $GITHUB_ENV
          else
            echo "PORT_2222_OPEN=false" >> $GITHUB_ENV
          fi

          echo "Testing port 21..."
          if nc -vz -w 20 "$FTP_SERVER" 21; then
            echo "PORT_21_OPEN=true" >> $GITHUB_ENV
          else
            echo "PORT_21_OPEN=false" >> $GITHUB_ENV
          fi

      - name: Deploy files to Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # PORT_2222_OPEN / PORT_21_OPEN come from GITHUB_ENV (previous step), not from the workflow env context.
          echo "PORT_2222_OPEN=$PORT_2222_OPEN"
          echo "PORT_21_OPEN=$PORT_21_OPEN"

          if [ "$PORT_2222_OPEN" != "true" ]; then
            echo "ERROR: Port 2222 is not open. Do not deploy."
            exit 1
          fi

          echo "Using SFTP on port 2222..."

          # cmd:fail-exit yes stops the whole session on the first failed put (e.g. 550 on /v/).
          # Then the other paths never run — use fail-exit no so every path is attempted.
          lftp <<LFTP
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 90
          set net:max-retries 2
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit no

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          # --- template_266.html (browser: https://www.mccabestheaterandliving.com/v/template_266.html)
          put template_266.html -o /v/template_266.html
          put template_266.html -o /template_266.html
          put template_266.html -o v/template_266.html
          put template_266.html -o template_266.html
          put template_266.html -o /v/v/template_266.html
          put template_266.html -o /mccabestheaterandliving.com/v/template_266.html

          # --- custom-safe.css (browser primary: /v/vspfiles/css/custom-safe.css)
          put vspfiles/css/custom-safe.css -o /v/vspfiles/css/custom-safe.css
          put vspfiles/css/custom-safe.css -o v/vspfiles/css/custom-safe.css
          put vspfiles/css/custom-safe.css -o /vspfiles/css/custom-safe.css
          put vspfiles/css/custom-safe.css -o vspfiles/css/custom-safe.css
          put vspfiles/css/custom-safe.css -o /v/custom-safe.css
          put vspfiles/css/custom-safe.css -o /mccabestheaterandliving.com/v/vspfiles/css/custom-safe.css

          # --- mccabe-overrides.css (browser: /v/vspfiles/templates/266/css/mccabe-overrides.css)
          put vspfiles/templates/266/css/mccabe-overrides.css -o /v/vspfiles/templates/266/css/mccabe-overrides.css
          put vspfiles/templates/266/css/mccabe-overrides.css -o v/vspfiles/templates/266/css/mccabe-overrides.css
          put vspfiles/templates/266/css/mccabe-overrides.css -o /vspfiles/templates/266/css/mccabe-overrides.css
          put vspfiles/templates/266/css/mccabe-overrides.css -o vspfiles/templates/266/css/mccabe-overrides.css
          put vspfiles/templates/266/css/mccabe-overrides.css -o /mccabestheaterandliving.com/v/vspfiles/templates/266/css/mccabe-overrides.css

          bye
          LFTP

      - name: Verify files on SFTP (markers must match Git)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          EXPECT=$(sed -n 's/.*name="mc-deploy-verify"[[:space:]]*content="\([^"]*\)".*/\1/p' template_266.html | head -1)
          CSS_TOKEN=$(head -c 8000 vspfiles/css/custom-safe.css | grep -aoE 'C_CSS_DEPLOY_VERIFY_[A-Za-z0-9]+' | head -1)
          MC_TOKEN=$(head -c 8000 vspfiles/templates/266/css/mccabe-overrides.css | grep -aoE 'MC_OVERRIDES_VERIFY_[A-Za-z0-9]+' | head -1)

          lftp <<LFTP
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 90
          set cmd:fail-exit no
          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222
          get /v/template_266.html -o verify-v.html
          get /template_266.html -o verify-root.html
          get v/template_266.html -o verify-vrel.html
          get template_266.html -o verify-rel.html
          get /v/vspfiles/css/custom-safe.css -o verify-css-vabs.html
          get v/vspfiles/css/custom-safe.css -o verify-css-vrel.html
          get /vspfiles/css/custom-safe.css -o verify-css-root.html
          get /v/vspfiles/templates/266/css/mccabe-overrides.css -o verify-mccabe-vabs.css
          get v/vspfiles/templates/266/css/mccabe-overrides.css -o verify-mccabe-vrel.css
          bye
          LFTP

          OK_TPL=""
          if [ -n "$EXPECT" ]; then
            echo "Expect template mc-deploy-verify: $EXPECT"
            for f in verify-v.html verify-root.html verify-vrel.html verify-rel.html; do
              if [ -f "$f" ] && grep -Fq "$EXPECT" "$f"; then
                echo "OK: template marker in $f"
                OK_TPL=1
                break
              fi
            done
            if [ -z "$OK_TPL" ]; then
              echo "ERROR: No downloaded template contains \"$EXPECT\"."
              ls -la verify-*.html 2>/dev/null || true
              exit 1
            fi
          fi

          if [ -n "$CSS_TOKEN" ]; then
            echo "Expect custom-safe contains: $CSS_TOKEN"
            OK_CSS=""
            for f in verify-css-vabs.html verify-css-vrel.html verify-css-root.html; do
              if [ -f "$f" ] && grep -Fq "$CSS_TOKEN" "$f"; then
                echo "OK: custom-safe marker in $f"
                OK_CSS=1
                break
              fi
            done
            if [ -z "$OK_CSS" ]; then
              echo "ERROR: No downloaded custom-safe copy contains \"$CSS_TOKEN\"."
              ls -la verify-css-*.html 2>/dev/null || true
              exit 1
            fi
          fi

          if [ -n "$MC_TOKEN" ]; then
            echo "Expect mccabe-overrides contains: $MC_TOKEN"
            OK_MC=""
            for f in verify-mccabe-vabs.css verify-mccabe-vrel.css; do
              if [ -f "$f" ] && grep -Fq "$MC_TOKEN" "$f"; then
                echo "OK: mccabe-overrides marker in $f"
                OK_MC=1
                break
              fi
            done
            if [ -z "$OK_MC" ]; then
              echo "ERROR: No downloaded mccabe-overrides copy contains \"$MC_TOKEN\"."
              ls -la verify-mccabe-*.css 2>/dev/null || true
              exit 1
            fi
          fi
