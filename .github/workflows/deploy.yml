name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Verify local files exist
        run: |
          echo "Repo root:"
          pwd

          echo "Latest commit:"
          git log -1 --oneline

          if [ ! -f "template_266.html" ]; then
            echo "ERROR: template_266.html is missing from repo root"
            exit 1
          fi

          if [ ! -f "vspfiles/css/custom-safe.css" ]; then
            echo "ERROR: vspfiles/css/custom-safe.css is missing"
            exit 1
          fi

          echo "Required files found."

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test Volusion connection ports
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "Testing port 2222..."
          if nc -vz -w 20 "$FTP_SERVER" 2222; then
            echo "PORT_2222_OPEN=true" >> $GITHUB_ENV
          else
            echo "PORT_2222_OPEN=false" >> $GITHUB_ENV
          fi

          echo "Testing port 21..."
          if nc -vz -w 20 "$FTP_SERVER" 21; then
            echo "PORT_21_OPEN=true" >> $GITHUB_ENV
          else
            echo "PORT_21_OPEN=false" >> $GITHUB_ENV
          fi

      - name: Deploy files to Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          PORT_2222_OPEN: ${{ env.PORT_2222_OPEN }}
          PORT_21_OPEN: ${{ env.PORT_21_OPEN }}
        run: |
          echo "PORT_2222_OPEN=$PORT_2222_OPEN"
          echo "PORT_21_OPEN=$PORT_21_OPEN"

          if [ "$PORT_2222_OPEN" != "true" ]; then
            echo "ERROR: Port 2222 is not open. Do not deploy."
            exit 1
          fi

          echo "Using SFTP on port 2222..."

          # Template loads /v/vspfiles/css/custom-safe.css first (see template_266.html). put -o does not
          # create missing directories (550). /v/ exists because template upload works — mkdir vspfiles/css under /v.
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 90
          set net:max-retries 2
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit yes

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Uploading template to /v/template_266.html..."
          put template_266.html -o /v/template_266.html

          echo "Uploading template to /template_266.html..."
          put template_266.html -o /template_266.html

          echo "Ensuring /v/vspfiles/css exists, uploading custom-safe.css (primary browser URL)..."
          set cmd:fail-exit no
          cd /v
          mkdir vspfiles
          mkdir vspfiles/css
          set cmd:fail-exit yes
          put vspfiles/css/custom-safe.css -o /v/vspfiles/css/custom-safe.css

          echo "Uploading custom-safe.css to /vspfiles/css/ (template onerror fallback)..."
          set cmd:fail-exit no
          cd /
          mkdir vspfiles
          mkdir vspfiles/css
          put vspfiles/css/custom-safe.css -o /vspfiles/css/custom-safe.css
          set cmd:fail-exit yes

          echo "Downloading files for verification..."
          get /v/template_266.html -o remote-template_266.html
          get /v/vspfiles/css/custom-safe.css -o remote-custom-safe-v.css

          bye
          EOF

          echo "Verify template marker..."
          grep -n "MC_DEPLOY_VERIFY" remote-template_266.html || {
            echo "ERROR: MC_DEPLOY_VERIFY not found in /v/template_266.html"
            exit 1
          }

          echo "Verify CSS marker (confirms /v/vspfiles/css/custom-safe.css is what the site loads first)..."
          grep -n "MC_CSS_DEPLOY_VERIFY" remote-custom-safe-v.css || {
            echo "ERROR: MC_CSS_DEPLOY_VERIFY not found — /v/vspfiles/css upload failed or wrong path"
            exit 1
          }

          head -n 3 remote-custom-safe-v.css
