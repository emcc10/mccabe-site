name: Deploy to Volusion

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deploy copy with forced marker
        run: |
          cp template_266.html deploy-template_266.html
          printf '<!-- FORCED-RUNNER-MARKER -->\n<div style="position:fixed;top:0;left:0;z-index:999999;background:red;color:#fff;padding:12px 16px;">FORCED RUNNER MARKER</div>\n' | cat - deploy-template_266.html > temp && mv temp deploy-template_266.html

      - name: Upload via SFTP on Port 2222
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

          sshpass -p "${{ secrets.FTP_PASSWORD }}" \
          sftp -o StrictHostKeyChecking=no \
               -o UserKnownHostsFile=/dev/null \
               -P 2222 \
               "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" <<'EOF'
          # Use the physical path that maps to your /v/ alias
          cd /vspfiles/templates/template_266
          put deploy-template_266.html template_266.html
          bye
          EOF
