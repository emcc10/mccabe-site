name: Deploy to Volusion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove problematic Microsoft/Azure apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install lftp, Python SFTP, and netcat
        run: |
          sudo apt-get install -y lftp netcat-openbsd openssh-client python3-pip
          pip3 install paramiko

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Deploy assets to Volusion (fast — CSS/JS first)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SKIP_TEMPLATE_DEPLOY: "0"
        run: bash .github/scripts/deploy-volusion.sh

      - name: Verify live PLP on storefront
        run: python3 scripts/verify_live_plp_deploy.py

      - name: Print deploy marker
        run: |
          echo "Deploy completed at $(date -u)"
          echo "Verify design-toolkit (PLP enforcer inlined):"
          echo "  https://www.mccabestheaterandliving.com/v/vspfiles/templates/266/js/min/design-toolkit.min.js"
          echo "  must contain MC_DTK_PLP_20260619"
          echo "Verify enforcer (no ?bust=1 — that URL is a stale CF cache bucket):"
          echo "  https://www.mccabestheaterandliving.com/v/vspfiles/js/mc-plp-enforcer.js"
          echo "Template must match repo after deploy:"
          echo "  https://www.mccabestheaterandliving.com/v/template_266.html"
          echo "  search for mc-plp-enforcer.js?v= from template_266.html body script"
          echo "Baked category pages still need Volusion File Editor → template_266 → Save once."
          echo "Optional CF purge (frozen query strings on baked HTML):"
          echo "  /v/vspfiles/js/mtl-sectional-renderer.js?v=sectional-20260516-leather-idempotent-v20"
          echo "  /v/vspfiles/templates/266/css/mccabe-overrides.css?v=20260516sectional-diagram-ux"
