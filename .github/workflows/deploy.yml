name: Deploy Volusion Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Upload main HTML template
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "template_266.html"
          target: "/vspfiles/"

      - name: Upload CSS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "css/custom-safe.css"
          target: "/vspfiles/css/"
