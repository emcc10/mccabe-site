name: Deploy to Volusion

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to Volusion FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Add these three lines to fix the timeout:
          passive: true
          timeout: 90000 
          local-dir: ./
          server-dir: /vspfiles/templates/template_266/
