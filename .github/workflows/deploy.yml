name: Deploy Volusion Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload HTML template
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -P 2222 \
          template_266.html \
          ${{ secrets.FTP_USERNAME }}@sftp.mccabestheaterandliving.com:/vspfiles/template_266.html

      - name: Upload CSS
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -P 2222 \
          css/custom-safe.css \
          ${{ secrets.FTP_USERNAME }}@sftp.mccabestheaterandliving.com:/vspfiles/css/custom-safe.css
