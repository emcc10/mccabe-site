name: Deploy to Volusion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify template file
        run: |
          echo "==== REPO FILE ===="
          head -20 template_266.html

      - name: Prepare deploy folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp template_266.html deploy/template_266.html
          echo "==== DEPLOY FILE ===="
          head -20 deploy/template_266.html

      - name: Deploy to Volusion via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: sftp
          local-dir: ./deploy/
          server-dir: /v/
