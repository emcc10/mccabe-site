name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:
  inputs:
    remote_path:
      description: "Remote path for vspfiles (e.g. /v/vspfiles/)"
      required: false
      default: "/v/vspfiles/"
    template_remote_path:
      description: "Remote path for template_266.html (e.g. /v/)"
      required: false
      default: "/v/"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      # Path resolution priority:
      # 1) Manual workflow input (workflow_dispatch)
      # 2) Repository variable DEPLOY_REMOTE_PATH
      # 3) Fallback default
      REMOTE_VSPFILES_PATH: ${{ github.event.inputs.remote_path || vars.DEPLOY_REMOTE_PATH || '/v/vspfiles/' }}
      # Path resolution priority:
      # 1) Manual workflow input (workflow_dispatch)
      # 2) Repository variable TEMPLATE_REMOTE_PATH
      # 3) Fallback default
      REMOTE_TEMPLATE_PATH: ${{ github.event.inputs.template_remote_path || vars.TEMPLATE_REMOTE_PATH || '/v/' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        run: |
          if [ -z "$FTP_SERVER" ]; then echo "::error::FTP_SERVER secret is not set in GitHub. Add it in repo Settings > Secrets and variables > Actions."; exit 1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::FTP_USERNAME secret is not set."; exit 1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::FTP_PASSWORD secret is not set."; exit 1; fi
          echo "Secrets are set. Deploying to $FTP_SERVER (port 2222)."

      - name: Install sshpass (for remote listing)
        timeout-minutes: 3
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Show what we are deploying
        run: |
          echo "Template file:"
          ls -la template_266.html 2>/dev/null || true
          echo "Contents of vspfiles/ (to ${REMOTE_VSPFILES_PATH}):"
          find vspfiles -type f | head -40
          ls -la vspfiles/css/custom-safe.css 2>/dev/null || true

      - name: Normalize remote paths
        run: |
          normalize() {
            p="$1"
            p="${p#./}"
            if [ -z "$p" ]; then
              p="./"
            elif [ "${p%/}" = "$p" ]; then
              p="${p}/"
            fi
            echo "$p"
          }
          echo "REMOTE_VSPFILES_PATH=$(normalize "$REMOTE_VSPFILES_PATH")" >> "$GITHUB_ENV"
          echo "REMOTE_TEMPLATE_PATH=$(normalize "$REMOTE_TEMPLATE_PATH")" >> "$GITHUB_ENV"

      - name: Create deploy marker
        run: |
          printf "Deployed UTC: %s\nGitHub run: %s\nCommit: %s\n" \
            "$(date -u '+%Y-%m-%d %H:%M:%S')" \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "${GITHUB_SHA}" > deploy-marker.txt
          cp deploy-marker.txt deploy-market.txt
          ls -la deploy-marker.txt
          ls -la deploy-market.txt

      - name: Show resolved remote paths
        run: |
          echo "Remote paths are relative to your SFTP user's HOME directory."
          echo "Template destination: ${REMOTE_TEMPLATE_PATH}template_266.html"
          echo "custom-safe.css path: ${REMOTE_VSPFILES_PATH}css/custom-safe.css"
          echo "Marker path (css):    ${REMOTE_VSPFILES_PATH}css/deploy-marker.txt"
          echo "Market path (css):    ${REMOTE_VSPFILES_PATH}css/deploy-market.txt"

      - name: Deploy via SFTP (explicit puts)
        timeout-minutes: 2
        run: |
          timeout 120s sshpass -p "$FTP_PASSWORD" sftp \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=20 \
          -o ServerAliveInterval=10 \
          -o ServerAliveCountMax=3 \
          -P 2222 "$FTP_USERNAME@$FTP_SERVER" <<EOF
          put "template_266.html" "${REMOTE_TEMPLATE_PATH}template_266.html"
          put "vspfiles/css/custom-safe.css" "${REMOTE_VSPFILES_PATH}css/custom-safe.css"
          put "deploy-marker.txt" "${REMOTE_VSPFILES_PATH}css/deploy-marker.txt"
          put "deploy-market.txt" "${REMOTE_VSPFILES_PATH}css/deploy-market.txt"
          bye
          EOF

      - name: Verify remote files via SFTP
        timeout-minutes: 2
        run: |
          set +e
          timeout 120s sshpass -p "$FTP_PASSWORD" sftp \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=20 \
          -o ServerAliveInterval=10 \
          -o ServerAliveCountMax=3 \
          -P 2222 "$FTP_USERNAME@$FTP_SERVER" <<EOF
          pwd
          ls -la
          ls -la ${REMOTE_TEMPLATE_PATH}
          ls -la ${REMOTE_VSPFILES_PATH}css
          ls -la ${REMOTE_VSPFILES_PATH}css/deploy-marker.txt
          ls -la ${REMOTE_VSPFILES_PATH}css/deploy-market.txt
          ls -la ${REMOTE_VSPFILES_PATH}css/custom-safe.css
          bye
          EOF
          echo "Remote listing complete."

      - name: Deploy summary
        run: |
          echo "If this run succeeded, files were written to the paths above under SFTP home."
          echo "If FileZilla still shows old times, open ${REMOTE_VSPFILES_PATH}css/deploy-marker.txt and verify the timestamp."
