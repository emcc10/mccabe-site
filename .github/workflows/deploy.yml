name: Deploy Volusion Theme - Verify Uploads

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Verify local files exist
        run: |
          echo "Repo root:"
          pwd

          echo "Latest commit:"
          git log -1 --oneline

          echo "Checking files..."

          if [ ! -f "template_266.html" ]; then
            echo "ERROR: template_266.html is missing from repo root"
            exit 1
          fi

          if [ ! -f "vspfiles/css/custom-safe.css" ]; then
            echo "ERROR: vspfiles/css/custom-safe.css is missing"
            exit 1
          fi

          if [ ! -f "vspfiles/templates/266/css/mccabe-overrides.css" ]; then
            echo "ERROR: vspfiles/templates/266/css/mccabe-overrides.css is missing"
            exit 1
          fi

          echo "Required files found."

          echo "Template marker check:"
          grep -n "GITHUB\|DEPLOY\|MCCABE" template_266.html | head -10 || true

          echo "custom-safe marker check:"
          grep -n "GITHUB\|DEPLOY\|MCCABE" vspfiles/css/custom-safe.css | head -10 || true

          echo "mccabe-overrides marker check:"
          grep -n "GITHUB\|DEPLOY\|MCCABE" vspfiles/templates/266/css/mccabe-overrides.css | head -10 || true

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test Volusion SFTP port
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          echo "Testing port 2222..."
          nc -vz -w 20 "$FTP_SERVER" 2222

      - name: Deploy and verify remote files
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 90
          set net:max-retries 2
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit yes

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Uploading template to /v/template_266.html..."
          put template_266.html -o /v/template_266.html

          echo "Uploading template to /template_266.html..."
          put template_266.html -o /template_266.html

          echo "Uploading custom-safe.css to /vspfiles/css/custom-safe.css..."
          put vspfiles/css/custom-safe.css -o /vspfiles/css/custom-safe.css

          echo "Uploading mccabe-overrides.css to /vspfiles/templates/266/css/mccabe-overrides.css..."
          put vspfiles/templates/266/css/mccabe-overrides.css -o /vspfiles/templates/266/css/mccabe-overrides.css

          echo "Downloading uploaded files back for verification..."
          get /v/template_266.html -o remote-v-template_266.html
          get /template_266.html -o remote-root-template_266.html
          get /vspfiles/css/custom-safe.css -o remote-custom-safe.css
          get /vspfiles/templates/266/css/mccabe-overrides.css -o remote-mccabe-overrides.css

          bye
          EOF

          echo "Remote /v/template_266.html marker check:"
          grep -n "GITHUB\|DEPLOY\|MCCABE" remote-v-template_266.html | head -20 || true

          echo "Remote /template_266.html marker check:"
          grep -n "GITHUB\|DEPLOY\|MCCABE" remote-root-template_266.html | head -20 || true

          echo "Remote custom-safe.css marker check:"
          grep -n "GITHUB\|DEPLOY\|MCCABE" remote-custom-safe.css | head -20 || true

          echo "Remote mccabe-overrides.css marker check:"
          grep -n "GITHUB\|DEPLOY\|MCCABE" remote-mccabe-overrides.css | head -20 || true
