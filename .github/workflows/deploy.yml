name: Deploy to Volusion

# Matches scripts/upload_template_css.ps1: template → remote / , CSS → /vspfiles/css/

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
      - 'vspfiles/css/custom-safe.css'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload template and CSS via SFTP (port 2222)
        env:
          SECRET_SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SECRET_FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_ROOT_V: ${{ secrets.SFTP_ROOT_V }}
          # Optional: if CSS lives elsewhere (rare). Default: <template-root>/vspfiles/css
          SFTP_CSS_SUBDIR: ${{ secrets.SFTP_CSS_SUBDIR }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"

          SFTP_HOST="${SECRET_SFTP_HOST:-}"
          if [ -z "$SFTP_HOST" ]; then
            SFTP_HOST="${SECRET_FTP_HOST:-}"
          fi
          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Missing secrets. Set SFTP_HOST (or FTP_HOST), FTP_USERNAME, and FTP_PASSWORD."
            exit 1
          fi

          if [ ! -f template_266.html ] || [ ! -f vspfiles/css/custom-safe.css ]; then
            echo "::error::Expected files missing after checkout (template_266.html or vspfiles/css/custom-safe.css)."
            ls -la
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          # sshpass -p breaks passwords containing $ ! ` etc.; -e reads SSHPASS safely
          export SSHPASS="${SFTP_PASS}"

          CSS_REL="${SFTP_CSS_SUBDIR:-vspfiles/css}"

          echo "Deploying to ${SFTP_HOST}:2222 as ${SFTP_USER}"
          echo "Local: $(pwd)/template_266.html ($(wc -c < template_266.html | tr -d ' ') bytes)"
          echo "Local: $(pwd)/vspfiles/css/custom-safe.css ($(wc -c < vspfiles/css/custom-safe.css | tr -d ' ') bytes)"
          echo "Remote CSS subdir (under template root): ${CSS_REL}"

          run_sftp_batch() {
            local batch="$1"
            # -v surfaces "real path" and errors in the Actions log
            sshpass -e sftp -v -b "$batch" \
              -oBatchMode=no \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -P 2222 \
              "${SFTP_USER}@${SFTP_HOST}"
          }

          echo "::group::SFTP login check (pwd, ls)"
          diag="$(mktemp)"
          printf '%s\n' 'pwd' 'ls' 'bye' > "$diag"
          if ! run_sftp_batch "$diag"; then
            rm -f "$diag"
            echo "::endgroup::"
            echo "::error::SFTP could not connect or authenticate. Re-check SFTP_HOST/FTP_HOST, port 2222, FTP_USERNAME, FTP_PASSWORD (same as FileZilla). Passwords with special characters must be stored exactly in the secret."
            exit 1
          fi
          rm -f "$diag"
          echo "::endgroup::"

          try_batch() {
            local title="$1"
            shift
            local batch
            batch="$(mktemp)"
            printf '%s\n' "$@" > "$batch"
            echo "::group::Try: $title"
            echo "Batch commands:"
            sed 's/^/  /' "$batch"
            if run_sftp_batch "$batch"; then
              echo "::endgroup::"
              rm -f "$batch"
              return 0
            fi
            echo "::endgroup::"
            rm -f "$batch"
            return 1
          }

          try_under_root() {
            local root="$1"
            try_batch "cd ${root} → template + ${CSS_REL}" \
              "cd ${root}" \
              "put template_266.html template_266.html" \
              "cd ${CSS_REL}" \
              "put vspfiles/css/custom-safe.css custom-safe.css" \
              "bye"
          }

          ok=0
          if [ -n "${SFTP_ROOT_V:-}" ]; then
            if try_under_root "${SFTP_ROOT_V}"; then ok=1; fi
          else
            # No post-put ls: some servers error on ls -l and abort after a successful put
            if try_batch "cd / → template + /${CSS_REL}" \
              "cd /" \
              "put template_266.html template_266.html" \
              "cd /${CSS_REL}" \
              "put vspfiles/css/custom-safe.css custom-safe.css" \
              "bye"; then ok=1; fi

            if [ "$ok" -ne 1 ]; then
              if try_batch "login cwd → template + relative ${CSS_REL}" \
                "put template_266.html template_266.html" \
                "cd ${CSS_REL}" \
                "put vspfiles/css/custom-safe.css custom-safe.css" \
                "bye"; then ok=1; fi
            fi

            if [ "$ok" -ne 1 ]; then
              for root in "/mccabestheaterandliving.com/v" "/v" "v"; do
                if try_under_root "$root"; then ok=1; break; fi
              done
            fi
          fi

          if [ "$ok" -ne 1 ]; then
            echo "::error::All SFTP upload attempts failed (see -v lines above for 'No such file' / permission)."
            echo "::error::In FileZilla, note Remote site path when you open the folder that contains template_266.html. Add secret SFTP_ROOT_V with that path (e.g. /yourstore.com/v). If CSS is not under …/vspfiles/css, set SFTP_CSS_SUBDIR (e.g. vspfiles/css)."
            exit 1
          fi
          echo "::notice::Upload finished. Confirm on the live site with your MC_DEPLOY_VERIFY token."
