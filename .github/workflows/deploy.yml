name: Deploy to Volusion

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
      - 'vspfiles/css/custom-safe.css'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload template and CSS via SFTP (port 2222)
        env:
          SECRET_SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SECRET_FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          SFTP_HOST="${SECRET_SFTP_HOST:-}"
          if [ -z "$SFTP_HOST" ]; then
            SFTP_HOST="${SECRET_FTP_HOST:-}"
          fi
          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${SFTP_PASS:-}" ]; then
            echo "::error::Missing secrets. Set SFTP_HOST (or FTP_HOST), FTP_USERNAME, and FTP_PASSWORD."
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          echo "Deploying to ${SFTP_HOST}:2222"
          echo "  - /v/template_266.html ($(wc -c < template_266.html | tr -d ' ') bytes) — same file as Design → v / template_266.html"
          echo "  - /v/vspfiles/css/custom-safe.css ($(wc -c < vspfiles/css/custom-safe.css | tr -d ' ') bytes)"

          sshpass -p "$SFTP_PASS" sftp \
            -v \
            -oBatchMode=no \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P 2222 \
            "$SFTP_USER@$SFTP_HOST" << 'EOSFTP'
          cd /v
          put template_266.html template_266.html
          cd /v/vspfiles/css
          put vspfiles/css/custom-safe.css custom-safe.css
          bye
          EOSFTP

          echo "::notice::SFTP upload finished (v/template_266.html + v/vspfiles/css/custom-safe.css). Not the same path as vspfiles/templates/266/ (theme assets)."
