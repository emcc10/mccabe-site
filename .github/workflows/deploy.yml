name: Deploy Volusion Template - Hard Verify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show GitHub file being deployed
        run: |
          echo "Current branch/ref:"
          echo "$GITHUB_REF"

          echo "Current commit:"
          git log -1 --oneline

          echo "Repo root:"
          pwd

          echo "Confirm template file exists:"
          ls -la template_266.html

          echo "Local template marker search:"
          grep -n "FINAL TEMPLATE TEST\|GITHUB TEMPLATE\|0428\|DEPLOY TEST\|MC_DEPLOY_VERIFY" template_266.html || true

          echo "First 20 lines of local template:"
          head -20 template_266.html

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp netcat-openbsd

      - name: Check deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" || (echo "ERROR: FTP_SERVER is blank" && exit 1)
          test -n "$FTP_USERNAME" || (echo "ERROR: FTP_USERNAME is blank" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "ERROR: FTP_PASSWORD is blank" && exit 1)

          echo "FTP_SERVER is set"
          echo "FTP_USERNAME is set"
          echo "FTP_PASSWORD is set"

      - name: Test Volusion SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          nc -vz -w 20 "$FTP_SERVER" 2222

      - name: Upload template and verify remote copies
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 120
          set net:max-retries 3
          set net:reconnect-interval-base 10
          set xfer:clobber yes
          set cmd:fail-exit yes

          open -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222

          echo "Uploading template to /v/template_266.html..."
          put template_266.html -o /v/template_266.html

          echo "Uploading template to /template_266.html..."
          put template_266.html -o /template_266.html

          echo "Downloading /v/template_266.html back..."
          get /v/template_266.html -o remote-v-template_266.html

          echo "Downloading /template_266.html back..."
          get /template_266.html -o remote-root-template_266.html

          bye
          EOF

          echo "Remote /v/template_266.html marker search:"
          grep -n "FINAL TEMPLATE TEST\|GITHUB TEMPLATE\|0428\|DEPLOY TEST\|MC_DEPLOY_VERIFY" remote-v-template_266.html || true

          echo "Remote /template_266.html marker search:"
          grep -n "FINAL TEMPLATE TEST\|GITHUB TEMPLATE\|0428\|DEPLOY TEST\|MC_DEPLOY_VERIFY" remote-root-template_266.html || true

          echo "Remote /v/template_266.html first 20 lines:"
          head -20 remote-v-template_266.html

          echo "Remote /template_266.html first 20 lines:"
          head -20 remote-root-template_266.html
