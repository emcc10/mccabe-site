# SFTP deploy: uses secrets FTP_SERVER, FTP_USERNAME, FTP_PASSWORD (port 2222)
# Template at /template_266.html. Assets under /vspfiles/.
name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        run: |
          if [ -z "$FTP_SERVER" ]; then echo "::error::FTP_SERVER secret is not set."; exit 1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::FTP_USERNAME secret is not set."; exit 1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::FTP_PASSWORD secret is not set."; exit 1; fi
          echo "Server: $FTP_SERVER"
          echo "Username: $FTP_USERNAME"
          echo "Port: 2222"

      - name: Show source files
        run: |
          echo "Template source:"
          ls -la template_266.html 2>/dev/null || true
          echo "CSS source:"
          ls -la vspfiles/css/custom-safe.css 2>/dev/null || true
          echo "Deploy test source:"
          ls -la vspfiles/css/deploy-test.txt 2>/dev/null || true
          echo "Top of custom-safe.css:"
          head -20 vspfiles/css/custom-safe.css 2>/dev/null || true

      - name: Upload via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 2222
          source: "template_266.html,vspfiles/*"
          target: "/"

      - name: Deploy summary
        run: |
          echo "Expected remote template: /template_266.html"
          echo "Expected remote CSS: /vspfiles/css/custom-safe.css"
          echo "Expected remote test file: /vspfiles/css/deploy-test.txt"
