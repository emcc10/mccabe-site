name: Deploy to Volusion

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      remote_vspfiles_path:
        description: >-
          Absolute SFTP path for the vspfiles tree (browser URL is usually /v/vspfiles/...).
          If uploads succeed but the site never changes, try /v/vspfiles or ask Volusion where /v/ maps on SFTP.
        required: true
        default: "/vspfiles"

jobs:
  genesis:
    name: Genesis — Volusion full deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install tools
        run: |
          sudo apt-get install -y lftp netcat-openbsd

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Write deploy marker (local)
        run: |
          echo "deployed=$(date -u '+%Y-%m-%dT%H:%M:%SZ') commit=$GITHUB_SHA ref=$GITHUB_REF" > deploy-marker.txt

      - name: Mirror entire vspfiles/ to Volusion
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_VSPFILES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.remote_vspfiles_path || '/vspfiles' }}
        run: |
          set -euo pipefail
          echo "Remote vspfiles root: $REMOTE_VSPFILES"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222 <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 4
          set net:timeout 120
          set cmd:fail-exit yes
          mirror -R -v --parallel=3 vspfiles "${REMOTE_VSPFILES}"
          put deploy-marker.txt -o "${REMOTE_VSPFILES}/js/deploy-marker.txt"
          put template_266.html -o /template_266.html
          put template_266.html -o /v/template_266.html
          bye
          EOF

      - name: Retry locked files (template + sectional renderer)
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_VSPFILES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.remote_vspfiles_path || '/vspfiles' }}
        run: |
          set +e
          # Volusion can briefly lock hot files; re-put after short waits.

          retry_file () {
            local LOCAL="$1"
            local REMOTE_A="$2"
            local REMOTE_B="$3"
            local LABEL="$4"
            local attempt
            for attempt in 1 2 3 4 5 6; do
              echo "=== [$LABEL] retry attempt $attempt ==="
              sleep $((attempt * 5))
              local CMD="set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 60; put $LOCAL -o $REMOTE_A;"
              if [ -n "$REMOTE_B" ]; then
                CMD="$CMD put $LOCAL -o $REMOTE_B;"
              fi
              CMD="$CMD bye"
              OUT=$(lftp -u "$FTP_USERNAME","$FTP_PASSWORD" sftp://"$FTP_SERVER":2222 -e "$CMD" 2>&1)
              echo "$OUT"
              echo "$OUT" | grep -q "Access failed"
              STILL_LOCKED=$?
              if [ "$STILL_LOCKED" != "0" ]; then
                echo "=== [$LABEL] uploaded successfully on attempt $attempt ==="
                return 0
              fi
              if [ "$attempt" = "6" ]; then
                echo "=== WARNING: [$LABEL] still locked after 6 attempts. Continuing. ==="
              fi
            done
            return 0
          }

          retry_file "template_266.html" "/template_266.html" "/v/template_266.html" "template_266.html"
          retry_file "vspfiles/js/mtl-sectional-renderer.js" "$REMOTE_VSPFILES/js/mtl-sectional-renderer.js" "" "mtl-sectional-renderer.js"
          exit 0

      - name: Deploy summary (Welcome to Genesis)
        run: |
          echo "Genesis deploy finished."
          echo "Mirrored local vspfiles/ → ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.remote_vspfiles_path || '/vspfiles' }} (recursive)."
          echo "Templates: /template_266.html and /v/template_266.html"
          echo "Marker: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.remote_vspfiles_path || '/vspfiles' }}/js/deploy-marker.txt"
          echo "Verify: https://www.mccabestheaterandliving.com/v/vspfiles/js/deploy-marker.txt"
