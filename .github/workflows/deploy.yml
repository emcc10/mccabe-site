name: Deploy to Volusion

on:
  push:
    branches:
      - main
    # Sofa recolor / docs-only commits should not queue a 20-minute Volusion SFTP deploy.
    paths-ignore:
      - "sofa-recolor-tool/**"
      - "tools/**"
      - "**/*.md"
      - ".cursor/**"
      - "agent-transcripts/**"
  workflow_dispatch:
    inputs:
      upload_plp_photos:
        description: Upload all PLP photos via SFTP (slow; ~160 files)
        type: boolean
        default: true

# One deploy at a time — parallel runs corrupt the same SFTP files (550 locks, truncated PNGs).
concurrency:
  group: deploy-volusion-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove problematic Microsoft/Azure apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install lftp, Python SFTP, and netcat
        run: |
          sudo apt-get install -y lftp netcat-openbsd openssh-client python3-pip
          pip3 install paramiko

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Deploy to Volusion (template + assets; SFTP verify is the gate)
        id: deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SKIP_TEMPLATE_DEPLOY: "0"
          # Push = fast path (template/CSS/JS). Manual run can include all PLP photos.
          SKIP_PLP_PHOTOS: ${{ github.event_name == 'push' && '1' || (inputs.upload_plp_photos == false && '1' || '0') }}
        run: bash .github/scripts/deploy-volusion.sh

      - name: Verify live storefront (informational — CDN/baked HTML often lags SFTP)
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: python3 scripts/verify_live_plp_deploy.py --soft

      - name: Deploy summary
        if: always()
        run: |
          echo "Deploy step: ${{ steps.deploy.outcome }}"
          echo "SFTP template verify inside deploy script is authoritative for CI pass/fail."
          echo "After green: Volusion Design → File Editor → template_266.html → Save (rebake categories/PDPs)."
          echo "Manual full photo upload: Actions → Run workflow → check 'Upload all PLP photos'."
