name: Deploy Volusion Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Upload main HTML template
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: "template_266.html"
          remote_path: "/vspfiles/template_266.html"

      - name: Upload CSS
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: "css/custom-safe.css"
          remote_path: "/vspfiles/css/custom-safe.css"
