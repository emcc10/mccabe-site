name: Deploy to Volusion

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show commit and branch
        run: |
          echo "BRANCH: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          git branch --show-current || true
          git log -1 --oneline

      - name: Show repo file top
        run: |
          echo "===== REPO template_266.html ====="
          ls -l
          head -40 template_266.html
          grep -n "RAW SFTP" template_266.html || true

      - name: Deploy template via SFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

          sshpass -p "${{ secrets.FTP_PASSWORD }}" \
          sftp -o StrictHostKeyChecking=no \
               -o UserKnownHostsFile=/dev/null \
               -P "${{ secrets.FTP_PORT }}" \
               "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" <<'EOF'
          cd /v
          put template_266.html template_266.html
          bye
          EOF
