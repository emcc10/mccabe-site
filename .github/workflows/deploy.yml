name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install netcat (port check)
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd lftp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Paramiko
        run: pip install --disable-pip-version-check "paramiko>=3.4,<4"

      - name: Verify local files exist
        run: |
          test -f template_266.html || (echo "missing template_266.html" && exit 1)
          test -f vspfiles/css/custom-safe.css || (echo "missing custom-safe.css" && exit 1)
          test -f vspfiles/templates/266/css/mccabe-overrides.css || (echo "missing mccabe-overrides.css" && exit 1)
          git log -1 --oneline

      - name: Check secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          test -n "$FTP_SERVER" && test -n "$FTP_USERNAME" && test -n "$FTP_PASSWORD"

      - name: Check SFTP port 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: nc -vz -w 20 "$FTP_SERVER" 2222

      - name: Upload theme (/v + chroot paths)
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_TEMPLATE_REMOTE: ${{ secrets.SFTP_TEMPLATE_REMOTE }}
          SFTP_CSS_REMOTE_FILE: ${{ secrets.SFTP_CSS_REMOTE_FILE }}
        run: python scripts/volusion_sftp_deploy.py

      - name: Quick verify (download + markers)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ "${{ vars.SKIP_DEPLOY_VERIFY }}" = "true" ]; then exit 0; fi
          EXPECT=$(sed -n 's/.*name="mc-deploy-verify"[[:space:]]*content="\([^"]*\)".*/\1/p' template_266.html | head -1)
          CSS=$(grep -aoE 'C_CSS_DEPLOY_VERIFY_[A-Za-z0-9]+' vspfiles/css/custom-safe.css | head -1)
          MC=$(grep -aoE 'MC_OVERRIDES_VERIFY_[A-Za-z0-9]+' vspfiles/templates/266/css/mccabe-overrides.css | head -1)

          lftp <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set net:timeout 90
          set cmd:fail-exit no
          open -u "${FTP_USERNAME}","${FTP_PASSWORD}" sftp://${FTP_SERVER}:2222
          get /v/template_266.html -o v-tpl.bin
          get template_266.html -o rel-tpl.bin
          get /v/vspfiles/css/custom-safe.css -o v-css.bin
          get vspfiles/css/custom-safe.css -o rel-css.bin
          get /v/vspfiles/templates/266/css/mccabe-overrides.css -o v-mc.bin
          get vspfiles/templates/266/css/mccabe-overrides.css -o rel-mc.bin
          bye
          EOF

          ok=0
          for f in v-tpl.bin rel-tpl.bin; do
            [ -s "$f" ] && grep -Fq "$EXPECT" "$f" && ok=1 && break
          done
          [ "$ok" = 1 ] || { echo "template marker missing"; exit 1; }

          ok=0
          for f in v-css.bin rel-css.bin; do
            [ -s "$f" ] && grep -Fq "$CSS" "$f" && ok=1 && break
          done
          [ "$ok" = 1 ] || { echo "custom-safe marker missing"; exit 1; }

          ok=0
          for f in v-mc.bin rel-mc.bin; do
            [ -s "$f" ] && grep -Fq "$MC" "$f" && ok=1 && break
          done
          [ "$ok" = 1 ] || { echo "mccabe marker missing"; exit 1; }
