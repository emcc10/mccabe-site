name: Deploy to Volusion

on:
  push:
    branches:
      - main
    paths:
      - 'template_266.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to Volusion FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Port 21 is the Volusion standard
          port: 21 
          # Matches your file in the repo
          local-dir: ./ 
          # Ensure this matches your actual theme folder name
          server-dir: /vspfiles/templates/template_266/ 

