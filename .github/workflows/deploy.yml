name: Deploy Volusion Theme (SFTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy HTML templates (includes inline scripts)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          source: "template_266.html*"
          target: "/vspfiles/"
          strip_components: 0

      - name: Deploy CSS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: sftp.mccabestheaterandliving.com
          port: 2222
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # IMPORTANT: source should be a path in your repo, not an absolute server path
          source: "vspfiles/css/custom-safe.css"
          target: "/vspfiles/css/"
          # remove leading "vspfiles/css" so the file lands directly in /vspfiles/css/
          strip_components: 2
