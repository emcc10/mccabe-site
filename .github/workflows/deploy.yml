name: Deploy Volusion Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload HTML template via SFTP
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -P 2222 \
          ${{ secrets.FTP_USERNAME }}@sftp.mccabestheaterandliving.com << 'EOF'
          put "template_266.html" "/vspfiles/templates/266/template_266.html"
          EOF

      - name: Upload CSS via SFTP
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -P 2222 \
          ${{ secrets.FTP_USERNAME }}@sftp.mccabestheaterandliving.com << 'EOF'
          put "vspfiles/css/custom-safe.css" "/vspfiles/css/custom-safe.css"
          EOF
