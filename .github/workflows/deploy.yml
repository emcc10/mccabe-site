# SFTP deploy: uses secrets FTP_SERVER, FTP_USERNAME, FTP_PASSWORD (port 2222)
# Template at v/template_266.html. Assets under v/vspfiles/.
name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      remote_path:
        description: "Remote path for vspfiles (e.g. v/vspfiles/ or vspfiles/)"
        required: false
        default: "v/vspfiles/"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        run: |
          if [ -z "$FTP_SERVER" ]; then echo "::error::FTP_SERVER secret is not set in GitHub. Add it in repo Settings → Secrets and variables → Actions."; exit 1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::FTP_USERNAME secret is not set."; exit 1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::FTP_PASSWORD secret is not set."; exit 1; fi
          echo "Secrets are set. Deploying to $FTP_SERVER (port 2222)."

      - name: Show what we're deploying
        run: |
          echo "Template (to remote root):"
          ls -la template_266.html 2>/dev/null || true
          echo "Contents of vspfiles/ (to v/vspfiles/):"
          find vspfiles -type f | head -40
          ls -la vspfiles/css/custom-safe.css 2>/dev/null || true

      - name: Show exact remote paths (for FileZilla comparison)
        run: |
          VSP_PATH="${{ github.event.inputs.remote_path || 'v/vspfiles/' }}"
          echo "Remote paths are relative to your SFTP user's HOME directory."
          echo "Template will be uploaded to:  v/template_266.html"
          echo "vspfiles will be uploaded to:  $VSP_PATH"
          echo "So custom-safe.css lands at:   ${VSP_PATH}css/custom-safe.css"
          echo ""
          echo "In FileZilla: after login, you start in that HOME folder. Look for the folder 'v' (or 'vspfiles' if you used that path). The Modified time of custom-safe.css there should be NOW after this run."

      - name: Deploy via SFTP
        uses: Dylan700/sftp-upload-action@v1.2.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: "2222"
          uploads: |
            template_266.html => v/
            vspfiles/ => ${{ github.event.inputs.remote_path || 'v/vspfiles/' }}

      - name: Deploy summary
        run: |
          echo "If the job succeeded, the files were written to the paths above (under your SFTP home)."
          echo "If FileZilla still shows Modified = 11:51 a.m., you are either looking in a different folder than the workflow uses, or the SFTP home for this user is different from where the web server serves /v/ from."
