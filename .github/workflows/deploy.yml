name: Deploy to Volusion

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove problematic Microsoft/Azure apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update

      - name: Install lftp, Python SFTP, and netcat
        run: |
          sudo apt-get install -y lftp netcat-openbsd openssh-client python3-pip
          pip3 install paramiko

      - name: Test SFTP connection
        run: |
          nc -vz "$FTP_SERVER" 2222
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}

      - name: Deploy assets to Volusion (fast — CSS/JS first)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SKIP_TEMPLATE_DEPLOY: "1"
        run: bash .github/scripts/deploy-volusion.sh

      - name: Print deploy marker
        run: |
          echo "Deploy completed at $(date -u)"
          echo "Verify: https://www.mccabestheaterandliving.com/v/vspfiles/js/mc-plp-enforcer.js?bust=1"
          echo "  must contain MC_PLP_ENFORCER_20260518d"
          echo "Verify: https://www.mccabestheaterandliving.com/v/vspfiles/css/custom-safe.css?bust=1"
          echo "  line 1 must contain C_CSS_DEPLOY_VERIFY_20260518d"
          echo "Then hard-refresh https://www.mccabestheaterandliving.com/-s/177.htm"
          echo "If still broken, Cloudflare Purge by URL:"
          echo "  /v/vspfiles/js/mtl-sectional-renderer.js?v=sectional-20260516-leather-idempotent-v20"
