name: Deploy Volusion Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Lets you run "Deploy Volusion Theme" manually from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:      
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to FTP (vspfiles: templates, css, js)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          ftp-server: ${{ secrets.FTP_SERVER }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: vspfiles/
