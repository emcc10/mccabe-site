name: Deploy My Boards only

on:
  workflow_dispatch:

concurrency:
  group: deploy-boards-only
  cancel-in-progress: false

jobs:
  deploy-boards:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Python SFTP
        run: pip3 install paramiko

      - name: Upload boards to /v/vspfiles (SFTP verify is authoritative)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: "2222"
        run: |
          if command -v node >/dev/null 2>&1 && [[ -f scripts/sanitize-boards-css.mjs ]]; then
            node scripts/sanitize-boards-css.mjs || true
          fi
          python3 scripts/upload_boards_canonical.py

      - name: Verify live boards JS (HTTP may lag SFTP)
        run: |
          want=$(wc -c < vspfiles/boards/my-boards-page.js | tr -d ' ')
          url="https://www.mccabestheaterandliving.com/v/vspfiles/boards/my-boards-page.js"
          ok=0
          for i in 1 2 3 4 5 6; do
            got=$(curl -fsSL "${url}?v=$(date +%s)&n=${i}" -H "Cache-Control: no-cache" 2>/dev/null | wc -c | tr -d ' ' || echo 0)
            echo "attempt ${i}: live=${got} want=${want}"
            if [[ "$got" == "$want" ]] && curl -fsSL "${url}?v=$(date +%s)&n=${i}" -H "Cache-Control: no-cache" | grep -q '__MC_BOARDS_PAGE_SCRIPT_LOADED'; then
              ok=1
              break
            fi
            sleep 15
          done
          if [[ "$ok" != "1" ]]; then
            echo "::warning::HTTP still stale (404 or old bytes) — SFTP verify above is authoritative; purge CDN for my-boards-page.js"
          fi
          curl -fsSL "https://www.mccabestheaterandliving.com/v/vspfiles/my-boards.html?v=$(date +%s)" -H "Cache-Control: no-cache" | grep -q '20260540' || {
            echo "::warning::Live HTML missing build 20260540 — re-run this workflow"
          }
